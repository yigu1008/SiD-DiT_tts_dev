description: flux-dynamic-cfg-x0-server

# Per-step adaptive CFG via decoded-x0 reward scoring (dynamic_cfg_x0).
# Pass 2 (FLUX) — single method, no comparison against other algorithms.
#
# Reward server (HPSv3 + ImageReward) runs on GPU 0; sampling on GPUs 1..N-1.
# Both x0 evaluators (ImageReward + HPSv3) are auto-routed to the server via
# REWARD_SERVER_URL — no local reward weights needed in the sampling env.
#
# Two FLUX backends covered (parameterized by target_model):
#   flux      — FLUX.1-dev, 28-step Euler, real-CFG via guidance_embeds
#   tdd_flux  — FLUX.1-dev + TDD LoRA, 8-step Euler, real-CFG ≈ 2.0
# (FLUX.1-schnell and senseflow_flux are intentionally skipped — neither has
#  effective guidance variation, so per-candidate search would be wasted work.)
#
# Phase 2: tear down server, evaluate saved best images with imagereward,
# hpsv2, pickscore one backend at a time (avoids single-GPU OOM).

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub hpsv2

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: flux-dyncfgx0-{target_model}-{search_reward}-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: False
    command:
      - set -x
      - unset REWARD_BACKEND REWARD_TYPE REWARD_BACKENDS || true
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export SID_FORCE_WANDB_STUB=1
      - export WANDB_DISABLED=true
      # ── Paths & HF auth ────────────────────────────────────────────────────
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - export AZFUSE_USE_FUSE=0
      - export NCCL_ASYNC_ERROR_HANDLING=0
      - export NCCL_P2P_LEVEL=NVL
      # ── ptca deps (sampling) ──────────────────────────────────────────────
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install --upgrade "setuptools>=70,<76" wheel
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - /opt/conda/envs/ptca/bin/python -c "import os, torch; print('[torch-check]', torch.__version__, 'cuda=', torch.version.cuda, 'is_available=', torch.cuda.is_available(), 'count=', torch.cuda.device_count(), 'cvd=', os.environ.get('CUDA_VISIBLE_DEVICES', '<unset>')); assert torch.cuda.is_available() and (torch.version.cuda is not None), 'CPU-only torch detected after requirements install'"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --force-reinstall --no-deps "xformers==0.0.31.post1" || true
      - /opt/conda/envs/ptca/bin/python -c "import xformers, xformers.ops; print('xformers ok', xformers.__version__)" || (/opt/conda/envs/ptca/bin/pip uninstall -y xformers && echo 'xformers disabled')
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "fire" "peft>=0.8.0" "einops>=0.6.0" "opencv-python>=4.5.0" "safetensors>=0.3.0" "accelerate>=0.20.0" "qwen-vl-utils>=0.0.8" "matplotlib" "prettytable" "pandas" "pydantic" "requests" "tensorboard" "packaging" || true
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "xxhash>=3.4.1" "ftfy>=6.2.3" "regex>=2024.11.6" "tqdm>=4.66.4"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "pandas>=2.1.4" "pyarrow>=14.0.2" "datasets>=2.19.0"
      - unset HF_HUB_OFFLINE TRANSFORMERS_OFFLINE || true
      # ── Cache dirs ────────────────────────────────────────────────────────
      - export IMAGEREWARD_CACHE=/mnt/data/v-yigu/model_cache/ImageReward
      - export HPS_ROOT=/mnt/data/v-yigu/model_cache/hpsv2
      - export CLIP_CACHE_DIR=/mnt/data/v-yigu/model_cache/clip
      - mkdir -p /home/aiscuser/hf_cache /mnt/data/v-yigu/model_cache/ImageReward /mnt/data/v-yigu/model_cache/hpsv2 /mnt/data/v-yigu/model_cache/clip
      - ln -sfn /mnt/data/v-yigu/model_cache/clip /home/aiscuser/.cache/clip || true
      - ln -sfn /mnt/data/v-yigu/model_cache/ImageReward /home/aiscuser/.cache/ImageReward || true
      # ── Preload FLUX.1-dev (both flux & tdd_flux derive from it) + Qwen ───
      - export HF_HUB_ENABLE_HF_TRANSFER=0
      - /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('black-forest-labs/FLUX.1-dev', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('FLUX.1-dev cache OK')"
      - if [ "{target_model}" = "tdd_flux" ]; then /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import hf_hub_download; import os; p = hf_hub_download(repo_id='RED-AIGC/TDD', filename='FLUX.1-dev_tdd_adv_lora_weights.safetensors', cache_dir=os.environ.get('HF_HOME'), token=os.environ.get('HF_TOKEN'), resume_download=True); print('TDD LoRA cache OK:', p)"; fi
      - if [ {use_qwen} = 1 ]; then /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('Qwen/Qwen3-4B', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('Qwen cache OK')"; fi
      # ── Prompt file ───────────────────────────────────────────────────────
      - export HPSV2_PROMPT_DIR=/mnt/data/v-yigu/hpsv2_prompt_cache
      - export PROMPT_STYLE={prompt_style}
      - OUT_DIR="$$HPSV2_PROMPT_DIR" STYLE="$$PROMPT_STYLE" bash get_hpsv2_prompts.sh
      - if [ "$$PROMPT_STYLE" = "all" ]; then export PROMPT_FILE="$$HPSV2_PROMPT_DIR/hpsv2_prompts.txt"; else export PROMPT_FILE="$$HPSV2_PROMPT_DIR/hpsv2_prompts_$$PROMPT_STYLE.txt"; fi
      - if [ {use_subset} = 1 ]; then export PROMPT_FILE=./hpsv2_subset.txt; fi
      # ── Build isolated reward env (HPSv3 + ImageReward + eval backends) ──
      - export REWARD_ENV_NAME=reward
      - export REWARD_ENV_SENTINEL_DIR=/tmp
      - CONDA_BASE=/opt/conda REWARD_ENV_NAME="$$REWARD_ENV_NAME" REWARD_ENV_SENTINEL_DIR="$$REWARD_ENV_SENTINEL_DIR" bash setup_reward_env.sh
      - export REWARD_ENV_PREFIX=$$(cat "$$REWARD_ENV_SENTINEL_DIR/reward_env_prefix_$$REWARD_ENV_NAME")
      - export REWARD_PY=$$REWARD_ENV_PREFIX/bin/python
      - 'echo "Reward env prefix: $$REWARD_ENV_PREFIX"'
      - 'if [ ! -x "$$REWARD_PY" ]; then echo "Reward env python not found: $$REWARD_PY"; exit 1; fi'
      - $$REWARD_PY -c "import torch, transformers; print('reward env torch='+torch.__version__, 'transformers='+transformers.__version__)"
      # ── Strict verify: ImageReward MUST be installed in reward env (the
      # default setup_reward_env.sh path only WARNs on failure, so a failed
      # install would otherwise silently leave the server hosting only hpsv3
      # and break the imagereward-guided run + the cross-run eval). Retry
      # with the most permissive flags then fail fast if still missing. ──
      # ── Fix-up envs built before the setuptools/fairscale fixes landed.
      - $$REWARD_PY -m pip install --no-cache-dir --upgrade "setuptools<80" "wheel" || true
      - $$REWARD_PY -m pip install --no-cache-dir "fairscale==0.4.4" || $$REWARD_PY -m pip install --no-cache-dir "fairscale" || true
      - $$REWARD_PY -c "import ImageReward; print('[verify] reward env ImageReward', ImageReward.__file__)" || $$REWARD_PY -m pip install --no-cache-dir --no-deps --no-build-isolation "git+https://github.com/THUDM/ImageReward.git" || $$REWARD_PY -m pip install --no-cache-dir --no-deps "git+https://github.com/THUDM/ImageReward.git" || $$REWARD_PY -m pip install --no-cache-dir --no-deps "image-reward==1.5" || true
      - $$REWARD_PY -c "import ImageReward; print('[verify-final] reward env ImageReward', ImageReward.__file__)"
      # ── Preload reward weights in reward env (BOTH hpsv3 and imagereward) ─
      - export REWARD_BACKENDS='{reward_server_backends}'
      - export STAGE_REWARD_WEIGHTS_LOCAL=1
      - export REWARD_LOCAL_HF_CACHE=/tmp/hf_cache_local
      - $$REWARD_PY preload_reward_models.py
      - 'if [ -f "$$REWARD_LOCAL_HF_CACHE/.stage_done" ]; then export REWARD_HF_HOME="$$REWARD_LOCAL_HF_CACHE"; echo "Reward server will use local HF cache: $$REWARD_HF_HOME"; else export REWARD_HF_HOME="$$HF_HOME"; echo "Local staging unavailable; reward server using HF_HOME=$$HF_HOME"; fi'
      # ── Launch reward server on GPU 0 ────────────────────────────────────
      - export OUT_ROOT=/mnt/data/v-yigu/hpsv2_dyncfgx0_runs/{target_model}/{search_reward}/{run_tag}
      - mkdir -p "$$OUT_ROOT"
      - export REWARD_SERVER_PORT={reward_server_port}
      - export REWARD_SERVER_URL=http://localhost:$$REWARD_SERVER_PORT
      - export REWARD_SERVER_LOG=$$OUT_ROOT/reward_server.log
      - env -u NCCL_P2P_LEVEL -u NCCL_ASYNC_ERROR_HANDLING -u TORCH_NCCL_ASYNC_ERROR_HANDLING CUDA_VISIBLE_DEVICES=0 TOKENIZERS_PARALLELISM=false HF_HOME="$$REWARD_HF_HOME" "$$REWARD_PY" -u reward_server.py --port "$$REWARD_SERVER_PORT" --device cuda:0 --backends $$REWARD_BACKENDS --image_reward_model ImageReward-v1.0 --pickscore_model yuvalkirstain/PickScore_v1 > "$$REWARD_SERVER_LOG" 2>&1 &
      - export REWARD_SERVER_PID=$$!
      - trap 'kill $$REWARD_SERVER_PID >/dev/null 2>&1 || true' EXIT
      # ── Wait for /health (up to 60 min) ──────────────────────────────────
      - export HEALTH_OK=0
      - for i in $$(seq 1 1200); do if curl -s "$$REWARD_SERVER_URL/health" >/dev/null 2>&1; then export HEALTH_OK=1; break; fi; if ! kill -0 "$$REWARD_SERVER_PID" >/dev/null 2>&1; then echo "Reward server process exited before health check passed"; tail -n 200 "$$REWARD_SERVER_LOG" || true; exit 1; fi; if [ $$((i % 10)) -eq 0 ]; then echo "[health-wait] i=$$i server log tail:"; tail -n 20 "$$REWARD_SERVER_LOG" || true; fi; sleep 3; done
      - if [ "$$HEALTH_OK" != "1" ]; then echo "Reward server failed to become healthy"; tail -n 400 "$$REWARD_SERVER_LOG"; exit 1; fi
      - curl -s "$$REWARD_SERVER_URL/health" | tee "$$OUT_ROOT/reward_server_health.json"
      # ── Qwen rewrite cache ───────────────────────────────────────────────
      - mkdir -p /mnt/data/v-yigu/hpsv2_rewrite_cache
      - export REWRITES_FILE=/mnt/data/v-yigu/hpsv2_rewrite_cache/{run_tag}_{target_model}_$$PROMPT_STYLE_{start_index}_{end_index}.json
      - export USE_QWEN={use_qwen}
      - export PRECOMPUTE_REWRITES={precompute_rewrites}
      - export REWRITES_OVERWRITE={rewrites_overwrite}
      - export QWEN_PRECOMPUTE_DEVICE={qwen_precompute_device}
      - export QWEN_PRECOMPUTE_BATCH_SIZE={qwen_precompute_batch_size}
      - export QWEN_PRECOMPUTE_SAVE_EVERY={qwen_precompute_save_every}
      - export QWEN_PRECOMPUTE_CLEAR_CACHE={qwen_precompute_clear_cache}
      # ── Sampling env vars ────────────────────────────────────────────────
      - export START_INDEX={start_index}
      - export END_INDEX={end_index}
      - export METHODS='dynamic_cfg_x0'
      - export REWARD_BACKEND={search_reward}
      - export REWARD_TYPE={search_reward}
      - export REWARD_BACKENDS={search_reward}
      - export EVAL_BEST_IMAGES=1
      # Phase-1 eval covers BOTH rewards hosted on the server so the hpsv3- and
      # imagereward-guided runs can be compared on the same metric set; phase-2
      # adds hpsv2/pickscore in a separate server.
      - export EVAL_BACKENDS='imagereward hpsv3'
      - export REWARD_DEVICE=cuda
      - export EVAL_REWARD_DEVICE=cuda
      - export EVAL_ALLOW_MISSING_BACKENDS=0
      # Per-backend defaults: flux uses FLUX.1-dev / 28 steps / large CFG bank;
      # tdd_flux uses FLUX.1-dev + TDD LoRA / 8 steps / smaller CFG bank.
      - 'if [ "{target_model}" = "tdd_flux" ]; then export STEPS=8; export BASELINE_GUIDANCE_SCALE=2.0; export BASELINE_CFG=2.0; export CFG_SCALES="1.0 1.5 2.0 2.5 3.0"; export DYNAMIC_CFG_X0_GRID_AUTO="1.0 1.5 2.0 2.5 3.0"; export DYNAMIC_CFG_X0_CFG_MIN_AUTO=1.0; export DYNAMIC_CFG_X0_CFG_MAX_AUTO=3.5; export DYNAMIC_CFG_X0_CFG_SOFT_MAX_AUTO=3.0; export MODEL_ID=black-forest-labs/FLUX.1-dev; else export STEPS=28; export BASELINE_GUIDANCE_SCALE=4.5; export BASELINE_CFG=4.5; export CFG_SCALES="3.5 4.0 4.5 5.0 5.5 6.0 7.0"; export DYNAMIC_CFG_X0_GRID_AUTO="3.5 4.0 4.5 5.0 5.5 6.0 7.0"; export DYNAMIC_CFG_X0_CFG_MIN_AUTO=2.0; export DYNAMIC_CFG_X0_CFG_MAX_AUTO=8.0; export DYNAMIC_CFG_X0_CFG_SOFT_MAX_AUTO=6.5; export MODEL_ID=black-forest-labs/FLUX.1-dev; fi'
      - export AUTO_BACKEND_STEPS=0
      - export N_VARIANTS={n_variants}
      - export GEN_BATCH_SIZE=1
      - export FLUX_BACKEND={target_model}
      # ── Dynamic CFG x0 knobs ─────────────────────────────────────────────
      - export DYNAMIC_CFG_X0_GRID="$$DYNAMIC_CFG_X0_GRID_AUTO"
      - export DYNAMIC_CFG_X0_SCORE_START_FRAC={dynamic_cfg_x0_score_start_frac}
      - export DYNAMIC_CFG_X0_SCORE_END_FRAC={dynamic_cfg_x0_score_end_frac}
      - export DYNAMIC_CFG_X0_SCORE_EVERY={dynamic_cfg_x0_score_every}
      - export DYNAMIC_CFG_X0_EVALUATORS='{search_reward}'
      - export DYNAMIC_CFG_X0_WEIGHT_SCHEDULE={dynamic_cfg_x0_weight_schedule}
      - export DYNAMIC_CFG_X0_PROMPT_TYPE={dynamic_cfg_x0_prompt_type}
      - export DYNAMIC_CFG_X0_CONFIDENCE_GATING={dynamic_cfg_x0_confidence_gating}
      - export DYNAMIC_CFG_X0_SMOOTH_WEIGHT={dynamic_cfg_x0_smooth_weight}
      - export DYNAMIC_CFG_X0_HIGH_CFG_PENALTY={dynamic_cfg_x0_high_cfg_penalty}
      - export DYNAMIC_CFG_X0_CFG_SOFT_MAX="$$DYNAMIC_CFG_X0_CFG_SOFT_MAX_AUTO"
      - export DYNAMIC_CFG_X0_CFG_MIN="$$DYNAMIC_CFG_X0_CFG_MIN_AUTO"
      - export DYNAMIC_CFG_X0_CFG_MAX="$$DYNAMIC_CFG_X0_CFG_MAX_AUTO"
      - export DYNAMIC_CFG_X0_ADD_LOCAL_NEIGHBORHOOD={dynamic_cfg_x0_add_local_neighborhood}
      # ── Misc ────────────────────────────────────────────────────────────
      - export SEED={seed}
      - export RUN_SANA=0
      - export RUN_SD35=0
      - export RUN_FLUX=1
      - export SD35_BACKEND=sid
      - export SAVE_IMAGES=0
      - export SAVE_BEST_IMAGES=1
      - export SAVE_VARIANTS=0
      # ── Restrict sampling to GPUs 1..N-1 (server owns GPU 0) ─────────────
      - export SAMPLING_GPUS=$$((${GPUS} - 1))
      - export CUDA_VISIBLE_DEVICES=$$(seq -s, 1 $$SAMPLING_GPUS)
      - export NUM_GPUS=$$SAMPLING_GPUS
      - 'echo "Sampling on CUDA_VISIBLE_DEVICES=$$CUDA_VISIBLE_DEVICES NUM_GPUS=$$NUM_GPUS REWARD_SERVER_URL=$$REWARD_SERVER_URL FLUX_BACKEND=$$FLUX_BACKEND MODEL_ID=$$MODEL_ID"'
      # ── Run (reward_unified routes hpsv3+imagereward via REWARD_SERVER_URL) ─
      - bash hpsv2_sd35_flux_allalgos.sh
      # ── Phase 2: tear down server, eval extra backends one-at-a-time ─────
      - echo "[posthoc] killing reward server pid=$$REWARD_SERVER_PID before phase 2"
      - kill "$$REWARD_SERVER_PID" >/dev/null 2>&1 || true
      - for k in $$(seq 1 30); do if ! kill -0 "$$REWARD_SERVER_PID" >/dev/null 2>&1; then break; fi; sleep 1; done
      - fuser -k "$$REWARD_SERVER_PORT/tcp" >/dev/null 2>&1 || true
      - sleep 5
      - trap - EXIT
      - export POSTHOC_EVAL_BACKENDS='{posthoc_eval_backends}'
      - export POSTHOC_LAYOUT=flux
      - REWARD_PY="$$REWARD_PY" REWARD_SERVER_PORT="$$REWARD_SERVER_PORT" REWARD_HF_HOME="$$REWARD_HF_HOME" PYTHON_BIN="$$PYTHON_BIN" OUT_ROOT="$$OUT_ROOT" POSTHOC_EVAL_BACKENDS="$$POSTHOC_EVAL_BACKENDS" POSTHOC_LAYOUT="$$POSTHOC_LAYOUT" bash post_eval_extra_rewards.sh

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: "true"
        SHARED_MEMORY_PERCENT: "0.5"

  max_trials: 4
  type: grid
  params:
    - name: run_tag
      values: [ "flux_dyncfgx0_server" ]
    # ── Two separate runs: one search-time evaluator per run ─────────────
    - name: search_reward
      values: [ "hpsv3", "imagereward" ]
    - name: hf_token
      values: [ "YOUR_HF_TOKEN_HERE" ]
    - name: prompt_style
      values: [ "all" ]
    - name: start_index
      values: [ 0 ]
    - name: end_index
      values: [ -1 ]
    - name: use_subset
      values: [ 1 ]
    # ── Both FLUX backends covered as a 2-row grid ───────────────────────
    - name: target_model
      values: [ "flux", "tdd_flux" ]
    # Reward server hosts BOTH evaluators (so both runs share the same
    # server config); the actual search-time evaluator is picked via
    # {search_reward} above.
    - name: reward_server_backends
      values: [ "hpsv3 imagereward" ]
    # Phase 2 extra backends evaluated post-hoc, one server at a time.
    # (imagereward + hpsv3 already covered in phase 1; phase 2 fills hpsv2/pickscore.)
    - name: posthoc_eval_backends
      values: [ "hpsv2 pickscore" ]
    - name: reward_server_port
      values: [ 5102 ]
    - name: n_variants
      values: [ 1 ]
    # ── Dynamic CFG x0 knobs (CFG bank + min/max/soft_max are set per
    #    target_model in the command body — see STEPS/BASELINE_CFG line). ──
    - name: dynamic_cfg_x0_score_start_frac
      values: [ 0.0 ]
    - name: dynamic_cfg_x0_score_end_frac
      values: [ 1.0 ]
    - name: dynamic_cfg_x0_score_every
      values: [ 1 ]
    - name: dynamic_cfg_x0_weight_schedule
      values: [ "piecewise" ]
    - name: dynamic_cfg_x0_prompt_type
      values: [ "general" ]
    - name: dynamic_cfg_x0_confidence_gating
      values: [ 1 ]
    - name: dynamic_cfg_x0_smooth_weight
      values: [ 0.0 ]
    - name: dynamic_cfg_x0_high_cfg_penalty
      values: [ 0.01 ]
    - name: dynamic_cfg_x0_add_local_neighborhood
      values: [ 0 ]
    # ── Misc ──
    - name: seed
      values: [ 42 ]
    - name: use_qwen
      values: [ 1 ]
    - name: precompute_rewrites
      values: [ 1 ]
    - name: rewrites_overwrite
      values: [ 0 ]
    - name: qwen_precompute_device
      values: [ "auto" ]
    - name: qwen_precompute_batch_size
      values: [ 16 ]
    - name: qwen_precompute_save_every
      values: [ 1 ]
    - name: qwen_precompute_clear_cache
      values: [ 1 ]
