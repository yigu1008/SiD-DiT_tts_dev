description: flux-schnell-tts-scaling-hpsv3

# Test-time scaling sweep on FLUX.1-schnell with HPSv3 as the search-time
# selector. bon_mcts over an 8-rung reward-evaluation budget ladder B in
# {4,8,16,32,64,128,256,512}, transitioning from single-tree MCTS (low B,
# N_SEEDS=1,TOPK=1) to BoN-MCTS (high B). Budget is exact under sim_alloc=full:
#   B = N_SEEDS + TOPK * N_SIMS.
# ONE job sweeps the whole ladder: the reward server starts once and the
# command loops over TTS_BUDGETS, writing each rung to b<budget>/. A small
# curated set of human-portrait prompts is embedded inline as the {prompts}
# param (no HF download). Raw images saved.
# HPSv3 runs on GPU 0 via reward_server.py (isolated conda env); FLUX sampling
# runs on GPUs 1..7 and routes hpsv3 calls through REWARD_SERVER_URL.
# Mirror of sd35_sid_tts_scaling_hpsv3.yaml; run SiD first, then FLUX.

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub hpsv2

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: flux-tts-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: False
    command:
      - set -x
      - unset REWARD_BACKEND REWARD_TYPE REWARD_BACKENDS || true
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export SID_FORCE_WANDB_STUB=1
      - export WANDB_DISABLED=true
      # ?? Budget ladder is looped at run time (see TTS_BUDGETS near the end of
      #    this command); one job sweeps all rungs. sim_alloc=full so the budget
      #    is exact: B = N_SEEDS + TOPK*N_SIMS.
      # ?? Paths & HF auth ----
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - export AZFUSE_USE_FUSE=0
      - export NCCL_ASYNC_ERROR_HANDLING=0
      - export NCCL_P2P_LEVEL=NVL
      # ?? ptca deps (sampling) ----
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install --upgrade "setuptools>=70,<76" wheel
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - /opt/conda/envs/ptca/bin/python -c "import os, torch; print('[torch-check]', torch.__version__, 'cuda=', torch.version.cuda, 'is_available=', torch.cuda.is_available(), 'count=', torch.cuda.device_count()); assert torch.cuda.is_available() and (torch.version.cuda is not None), 'CPU-only torch detected'"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --force-reinstall --no-deps "xformers==0.0.31.post1" || true
      - /opt/conda/envs/ptca/bin/python -c "import xformers, xformers.ops; print('xformers ok', xformers.__version__)" || (/opt/conda/envs/ptca/bin/pip uninstall -y xformers && echo 'xformers disabled')
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "fire" "peft>=0.8.0" "einops>=0.6.0" "opencv-python>=4.5.0" "safetensors>=0.3.0" "accelerate>=0.20.0" "qwen-vl-utils>=0.0.8" "matplotlib" "prettytable" "pandas" "pydantic" "requests" "tensorboard" "packaging" || true
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "xxhash>=3.4.1" "ftfy>=6.2.3" "regex>=2024.11.6" "tqdm>=4.66.4"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "pandas>=2.1.4" "pyarrow>=14.0.2" "datasets>=2.19.0"
      - unset HF_HUB_OFFLINE TRANSFORMERS_OFFLINE || true
      # ?? Cache dirs ----
      - export IMAGEREWARD_CACHE=/mnt/data/v-yigu/model_cache/ImageReward
      - export HPS_ROOT=/mnt/data/v-yigu/model_cache/hpsv2
      - export CLIP_CACHE_DIR=/mnt/data/v-yigu/model_cache/clip
      - mkdir -p /home/aiscuser/hf_cache /mnt/data/v-yigu/model_cache/ImageReward /mnt/data/v-yigu/model_cache/hpsv2 /mnt/data/v-yigu/model_cache/clip
      - ln -sfn /mnt/data/v-yigu/model_cache/clip /home/aiscuser/.cache/clip || true
      - ln -sfn /mnt/data/v-yigu/model_cache/ImageReward /home/aiscuser/.cache/ImageReward || true
      # ?? Preload FLUX + Qwen3 into HF cache (ptca) ----
      - export HF_HUB_ENABLE_HF_TRANSFER=0
      - /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('black-forest-labs/FLUX.1-schnell', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('FLUX.1-schnell cache OK')"
      - if [ {use_qwen} = 1 ]; then /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('Qwen/Qwen3-4B', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('Qwen cache OK')"; fi
      # ?? Prompt file: curated human-portrait set embedded inline ('|'-delimited {prompts}) ----
      - export PROMPT_STYLE={prompt_style}
      - export PROMPT_FILE=/tmp/tts_portrait_prompts.txt
      - printf '%s\n' '{prompts}' | tr '|' '\n' > "$$PROMPT_FILE"
      - 'echo "[tts] wrote $$(wc -l < $$PROMPT_FILE) prompts to $$PROMPT_FILE"; cat "$$PROMPT_FILE"'
      # ?? Build isolated reward env (hpsv3 + eval backends) ----
      - export REWARD_ENV_NAME=reward
      - export REWARD_ENV_SENTINEL_DIR=/tmp
      - CONDA_BASE=/opt/conda REWARD_ENV_NAME="$$REWARD_ENV_NAME" REWARD_ENV_SENTINEL_DIR="$$REWARD_ENV_SENTINEL_DIR" bash setup_reward_env.sh
      - export REWARD_ENV_PREFIX=$$(cat "$$REWARD_ENV_SENTINEL_DIR/reward_env_prefix_$$REWARD_ENV_NAME")
      - export REWARD_PY=$$REWARD_ENV_PREFIX/bin/python
      - 'echo "Reward env prefix: $$REWARD_ENV_PREFIX"'
      - 'if [ ! -x "$$REWARD_PY" ]; then echo "Reward env python not found: $$REWARD_PY"; exit 1; fi'
      - $$REWARD_PY -c "import torch, transformers; print('reward env torch='+torch.__version__, 'transformers='+transformers.__version__)"
      # ?? Preload reward weights in reward env ----
      - export REWARD_BACKENDS='{reward_server_backends}'
      # Stage HPSv3 + Qwen2-VL-7B weights from blob FUSE to local NVMe so
      # reward-server shard loading doesn't hit the health-wait budget.
      - export STAGE_REWARD_WEIGHTS_LOCAL=1
      - export REWARD_LOCAL_HF_CACHE=/tmp/hf_cache_local
      - $$REWARD_PY preload_reward_models.py
      - 'if [ -f "$$REWARD_LOCAL_HF_CACHE/.stage_done" ]; then export REWARD_HF_HOME="$$REWARD_LOCAL_HF_CACHE"; echo "Reward server will use local HF cache: $$REWARD_HF_HOME"; else export REWARD_HF_HOME="$$HF_HOME"; echo "Local staging unavailable; reward server using HF_HOME=$$HF_HOME"; fi'
      # ?? Launch reward server on GPU 0 (shared across all budget rungs) ----
      - export RUN_ROOT=/mnt/data/v-yigu/tts_scaling/{run_tag}
      - mkdir -p "$$RUN_ROOT"
      - export REWARD_SERVER_PORT={reward_server_port}
      - export REWARD_SERVER_URL=http://localhost:$$REWARD_SERVER_PORT
      - export REWARD_SERVER_LOG=$$RUN_ROOT/reward_server.log
      - env -u NCCL_P2P_LEVEL -u NCCL_ASYNC_ERROR_HANDLING -u TORCH_NCCL_ASYNC_ERROR_HANDLING CUDA_VISIBLE_DEVICES=0 TOKENIZERS_PARALLELISM=false HF_HOME="$$REWARD_HF_HOME" "$$REWARD_PY" -u reward_server.py --port "$$REWARD_SERVER_PORT" --device cuda:0 --backends $$REWARD_BACKENDS --image_reward_model ImageReward-v1.0 --pickscore_model yuvalkirstain/PickScore_v1 > "$$REWARD_SERVER_LOG" 2>&1 &
      - export REWARD_SERVER_PID=$$!
      - trap 'kill $$REWARD_SERVER_PID >/dev/null 2>&1 || true' EXIT
      # ?? Wait for /health (up to 60 min; weights should be cached) ----
      - export HEALTH_OK=0
      - for i in $$(seq 1 1200); do if curl -s "$$REWARD_SERVER_URL/health" >/dev/null 2>&1; then export HEALTH_OK=1; break; fi; if ! kill -0 "$$REWARD_SERVER_PID" >/dev/null 2>&1; then echo "Reward server process exited before health check passed"; tail -n 200 "$$REWARD_SERVER_LOG" || true; exit 1; fi; if [ $$((i % 10)) -eq 0 ]; then echo "[health-wait] i=$$i server log tail:"; tail -n 20 "$$REWARD_SERVER_LOG" || true; fi; sleep 3; done
      - if [ "$$HEALTH_OK" != "1" ]; then echo "Reward server failed to become healthy"; tail -n 400 "$$REWARD_SERVER_LOG"; exit 1; fi
      - curl -s "$$REWARD_SERVER_URL/health" | tee "$$RUN_ROOT/reward_server_health.json"
      # ?? Qwen rewrite cache ----
      - mkdir -p /mnt/data/v-yigu/hpsv2_rewrite_cache
      - export REWRITES_FILE=/mnt/data/v-yigu/hpsv2_rewrite_cache/{run_tag}_$$PROMPT_STYLE_{start_index}_{end_index}.json
      - export USE_QWEN={use_qwen}
      - export PRECOMPUTE_REWRITES={precompute_rewrites}
      - export REWRITES_OVERWRITE={rewrites_overwrite}
      - export QWEN_PRECOMPUTE_DEVICE={qwen_precompute_device}
      - export QWEN_PRECOMPUTE_BATCH_SIZE={qwen_precompute_batch_size}
      - export QWEN_PRECOMPUTE_SAVE_EVERY={qwen_precompute_save_every}
      - export QWEN_PRECOMPUTE_CLEAR_CACHE={qwen_precompute_clear_cache}
      # ?? Sampling env vars ----
      - export START_INDEX={start_index}
      - export END_INDEX={end_index}
      - export METHODS='{methods}'
      - export REWARD_BACKEND=composite_3
      - export REWARD_TYPE=composite_3
      - export REWARD_BACKENDS='imagereward hpsv3 pickscore'
      # FLUX HPSv3 runs hot (~11-15); bump the composite HPSv3 upper bound so it
      # isn't clipped at 1.0 before averaging (default HI=14).
      - export COMPOSITE_HPSV3_HI=16
      - export EVAL_BEST_IMAGES=1
      - export EVAL_BACKENDS='{eval_backends}'
      - export REWARD_DEVICE=cuda
      - export EVAL_REWARD_DEVICE=cuda
      - export EVAL_ALLOW_MISSING_BACKENDS=0
      - export CFG_SCALES='{cfg_scales}'
      - export BASELINE_CFG={baseline_cfg}
      - export STEPS={steps}
      - export N_VARIANTS={n_variants}
      - export UCB_C={ucb_c}
      - export SMC_K={smc_k}
      - export SMC_GAMMA={smc_gamma}
      - export ESS_THRESHOLD={ess_threshold}
      - export RESAMPLE_START_FRAC={resample_start_frac}
      - export SMC_CFG_SCALE={smc_cfg_scale}
      - export SMC_VARIANT_IDX={smc_variant_idx}
      - export GA_POPULATION={ga_population}
      - export GA_GENERATIONS={ga_generations}
      - export GA_ELITES={ga_elites}
      - export GA_MUTATION_PROB={ga_mutation_prob}
      - export GA_TOURNAMENT_K={ga_tournament_k}
      - export GA_SELECTION={ga_selection}
      - export GA_RANK_PRESSURE={ga_rank_pressure}
      - export GA_CROSSOVER={ga_crossover}
      - export GA_LOG_TOPK={ga_log_topk}
      - export GA_EVAL_BATCH={ga_eval_batch}
      - export BON_N={bon_n}
      - export BEAM_WIDTH={beam_width}
      - export BON_MCTS_SEED_STRIDE={bon_mcts_seed_stride}
      - export BON_MCTS_SEED_OFFSET={bon_mcts_seed_offset}
      - export BON_MCTS_SIM_ALLOC=full
      - export BON_MCTS_MIN_SIMS={bon_mcts_min_sims}
      - export BON_MCTS_PRESCREEN_GUIDANCE='{bon_mcts_prescreen_guidance}'
      - export NOISE_INJECT_MODE={noise_inject_mode}
      - export NOISE_INJECT_SEED_BUDGET={noise_inject_seed_budget}
      - export NOISE_INJECT_CANDIDATE_STEPS='{noise_inject_candidate_steps}'
      - export NOISE_INJECT_GAMMA_BANK='{noise_inject_gamma_bank}'
      - export NOISE_INJECT_EPS_SAMPLES={noise_inject_eps_samples}
      - export NOISE_INJECT_STEPS_PER_ROLLOUT={noise_inject_steps_per_rollout}
      - export NOISE_INJECT_INCLUDE_NO_INJECT={noise_inject_include_no_inject}
      - export NOISE_INJECT_MAX_POLICIES={noise_inject_max_policies}
      - export NOISE_INJECT_VARIANT_IDX={noise_inject_variant_idx}
      - export NOISE_INJECT_CFG='{noise_inject_cfg}'
      - export NOISE_INJECT_GUIDANCE='{noise_inject_guidance}'
      - export SEED={seed}
      - export RUN_SANA=0
      - export RUN_SD35=0
      - export RUN_FLUX=1
      - export SAVE_IMAGES=1
      - export SAVE_BEST_IMAGES={save_best_images}
      - export SAVE_VARIANTS=0
      # ?? Restrict sampling to GPUs 1..N-1 (server owns GPU 0) ----
      - export SAMPLING_GPUS=$$((${GPUS} - 1))
      - export CUDA_VISIBLE_DEVICES=$$(seq -s, 1 $$SAMPLING_GPUS)
      - export NUM_GPUS=$$SAMPLING_GPUS
      - 'echo "Sampling on CUDA_VISIBLE_DEVICES=$$CUDA_VISIBLE_DEVICES NUM_GPUS=$$NUM_GPUS REWARD_SERVER_URL=$$REWARD_SERVER_URL"'
      # ?? Budget ladder: loop all 8 rungs in this one job (sim_alloc=full: B = NS + TK*SIMS).
      #    reward_unified routes hpsv3/eval via REWARD_SERVER_URL (server already up). ----
      - export TTS_BUDGETS='4 8 16 32 64 128 256 512'
      - 'for BUDGET in $$TTS_BUDGETS; do case "$$BUDGET" in 4) NS=1; TK=1; SIMS=3;; 8) NS=1; TK=1; SIMS=7;; 16) NS=1; TK=1; SIMS=15;; 32) NS=1; TK=1; SIMS=31;; 64) NS=4; TK=2; SIMS=30;; 128) NS=8; TK=2; SIMS=60;; 256) NS=16; TK=4; SIMS=60;; 512) NS=16; TK=8; SIMS=62;; *) echo "unknown budget $$BUDGET"; exit 1;; esac; export BON_MCTS_N_SEEDS=$$NS; export BON_MCTS_TOPK=$$TK; export N_SIMS=$$SIMS; export OUT_ROOT=$$RUN_ROOT/b$$BUDGET; mkdir -p "$$OUT_ROOT"; echo "[tts] budget=$$BUDGET -> N_SEEDS=$$NS TOPK=$$TK N_SIMS=$$SIMS OUT_ROOT=$$OUT_ROOT"; bash hpsv2_sd35_flux_allalgos.sh; done'

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: True
        SHARED_MEMORY_PERCENT: 0.5

  max_trials: 1
  type: grid
  params:
    # Single job. The 8-rung budget ladder {4,8,16,32,64,128,256,512} is swept
    # inside the command (TTS_BUDGETS loop); (N_SEEDS,TOPK,N_SIMS) derived per
    # rung via the budget->case map (sim_alloc=full: B = NS + TK*SIMS).
    - name: run_tag
      values: [ "flux_schnell_tts_scaling_hpsv3" ]
    - name: hf_token
      values: [ "YOUR_HF_TOKEN_HERE" ]
    - name: prompt_style
      values: [ "all" ]
    # Curated diverse HPDv2 prompts (compositional / multi-object) chosen for
    # reward headroom — replaces the saturated portrait set so test-time
    # scaling has variance to exploit. Embedded inline as one '|'-delimited value.
    - name: prompts
      values: [ "A kangaroo in an orange hoodie and blue sunglasses stands on the grass in front of the Sydney Opera House holding a Welcome Friends sign|A West Highland white terrier holding a Hug me sign|An ocelot sneaking through a bog in an oil painting|A fox wearing a yellow dress|A spring landscape painting featuring a treeless mountain village with melting lake ice, winding stone steps, and fog|A peaceful, nature-filled landscape with vibrant flowers and trees and a serene cloud-filled sky|A smiling man is cooking in his kitchen|A man rides a motorcycle down a dirt road|A girl is holding a large kite on a grassy field|A bottle of wine sitting on top of a table next to a glass of wine|A table topped with lots of food and drinks|A pink bicycle leaning against a green railing next to a canal|A modular dome house with a futuristic glass design, floating above a city in a cloudy atmosphere|An aircraft carrier perfectly encased within a glass bottle|A boy playing with a toy robot in a futuristic city|A unicorn with a car on its head|A photograph of a red cube on top of a blue sphere, with a green cone to the right|An astronaut riding a horse on the surface of the moon, with Earth visible in the dark sky|A steaming bowl of ramen with a soft-boiled egg, photographed from above on a rustic wooden table|A vintage red telephone box standing in a snowy pine forest at dusk, with warm light glowing inside|Two cats playing chess on a park bench, detailed watercolor illustration|A glass terrarium containing a miniature tropical rainforest with a tiny waterfall|A child's crayon drawing of a dragon guarding a castle, taped to a refrigerator door|A neon-lit street food stall on a rainy Tokyo street at night, reflections on the wet pavement, cyberpunk style" ]
    - name: start_index
      values: [ 0 ]
    # 24 curated diverse prompts (shared across all rungs and both models).
    - name: end_index
      values: [ 24 ]
    - name: methods
      values: [ "bon_mcts" ]
    - name: eval_backends
      values: [ "hpsv3" ]
    - name: reward_server_backends
      values: [ "imagereward hpsv3 pickscore" ]
    - name: reward_server_port
      values: [ 5100 ]
    - name: cfg_scales
      values: [ "1.0 1.25 1.5 1.75 2.0 2.25 2.5" ]
    - name: baseline_cfg
      values: [ 1.0 ]
    - name: steps
      values: [ 4 ]
    # Prompt search ON: bon_mcts branches over a 3-way Qwen rewrite bank in
    # addition to the seed + CFG-MCTS axes (use_qwen=1, precompute_rewrites=1).
    - name: n_variants
      values: [ 3 ]
    - name: ucb_c
      values: [ 1.41 ]
    - name: smc_k
      values: [ 8 ]
    - name: smc_gamma
      values: [ 0.10 ]
    - name: ess_threshold
      values: [ 0.5 ]
    - name: resample_start_frac
      values: [ 0.3 ]
    - name: smc_cfg_scale
      values: [ 1.25 ]
    - name: smc_variant_idx
      values: [ 0 ]
    - name: ga_population
      values: [ 24 ]
    - name: ga_generations
      values: [ 8 ]
    - name: ga_elites
      values: [ 4 ]
    - name: ga_mutation_prob
      values: [ 0.15 ]
    - name: ga_tournament_k
      values: [ 4 ]
    - name: ga_selection
      values: [ "rank" ]
    - name: ga_rank_pressure
      values: [ 1.7 ]
    - name: ga_crossover
      values: [ "uniform" ]
    - name: ga_log_topk
      values: [ 5 ]
    - name: ga_eval_batch
      values: [ 2 ]
    - name: bon_n
      values: [ 16 ]
    # bon_mcts_n_seeds / bon_mcts_topk / n_sims / sim_alloc are set per-rung in
    # the command by the TTS_BUDGETS loop; not parameterized here.
    - name: bon_mcts_seed_stride
      values: [ 1 ]
    - name: bon_mcts_seed_offset
      values: [ 0 ]
    - name: bon_mcts_min_sims
      values: [ 1 ]
    - name: bon_mcts_prescreen_guidance
      values: [ "" ]
    - name: beam_width
      values: [ 4 ]
    - name: noise_inject_mode
      values: [ "combined" ]
    - name: noise_inject_seed_budget
      values: [ 8 ]
    - name: noise_inject_candidate_steps
      values: [ "" ]
    - name: noise_inject_gamma_bank
      values: [ "0.0 0.25 0.5" ]
    - name: noise_inject_eps_samples
      values: [ 4 ]
    - name: noise_inject_steps_per_rollout
      values: [ 1 ]
    - name: noise_inject_include_no_inject
      values: [ 1 ]
    - name: noise_inject_max_policies
      values: [ 0 ]
    - name: noise_inject_variant_idx
      values: [ 0 ]
    - name: noise_inject_cfg
      values: [ "" ]
    - name: noise_inject_guidance
      values: [ "" ]
    - name: seed
      values: [ 42 ]
    # SAVE_IMAGES hardcoded to 1 in the command (raw images for every rung).
    - name: save_best_images
      values: [ 1 ]
    - name: use_qwen
      values: [ 1 ]
    - name: precompute_rewrites
      values: [ 1 ]
    - name: rewrites_overwrite
      values: [ 0 ]
    - name: qwen_precompute_device
      values: [ "auto" ]
    - name: qwen_precompute_batch_size
      values: [ 16 ]
    - name: qwen_precompute_save_every
      values: [ 1 ]
    - name: qwen_precompute_clear_cache
      values: [ 1 ]
