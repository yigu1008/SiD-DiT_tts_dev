description: flux-tdd-dts-imagereward

# Standard DTS / DTS* on TDD-distilled FLUX.1-dev (RED-AIGC TDD LoRA).
# Recipe: load FLUX.1-dev → load FLUX.1-dev_tdd_adv_lora_weights.safetensors
# → fuse_lora(scale=0.125). 8 inference steps, real CFG (~2.0),
# max_sequence_length=256. M=32 → 256 tree-NFE/prompt (matches schnell M=64×4).

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub hpsv2
    - pip list

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: flux-tdd-dts-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}-IB
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: False
    command:
      - set -x
      - unset REWARD_BACKEND REWARD_TYPE REWARD_BACKENDS || true
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export SID_FORCE_WANDB_STUB=1
      - export WANDB_DISABLED=true
      # ── Paths ──────────────────────────────────────────────────────────────
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - export FLUX_BACKEND=tdd_flux
      - export AZFUSE_USE_FUSE=0
      - export NCCL_ASYNC_ERROR_HANDLING=0
      - export NCCL_P2P_LEVEL=NVL
      # ── Install deps ───────────────────────────────────────────────────────
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install --upgrade "setuptools>=70,<76" wheel
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - /opt/conda/envs/ptca/bin/python -c "import os, torch; print('[torch-check]', torch.__version__, 'cuda=', torch.version.cuda, 'is_available=', torch.cuda.is_available(), 'count=', torch.cuda.device_count())"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --force-reinstall --no-deps "xformers==0.0.31.post1" || true
      - /opt/conda/envs/ptca/bin/python -c "import xformers, xformers.ops; print('xformers ok', xformers.__version__)" || (/opt/conda/envs/ptca/bin/pip uninstall -y xformers && echo 'xformers disabled')
      - PYTHON_BIN=/opt/conda/envs/ptca/bin/python bash install_reward_deps.sh
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "xxhash>=3.4.1" "ftfy>=6.2.3" "regex>=2024.11.6" "tqdm>=4.66.4"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "pandas>=2.1.4" "pyarrow>=14.0.2" "datasets>=2.19.0"
      - /opt/conda/envs/ptca/bin/python -c "import importlib.metadata as md, xxhash, clip, ftfy, regex, pandas, pyarrow, datasets; from timm.data import ImageNetInfo; print('reward deps ok', md.version('xxhash'), md.version('ftfy'), md.version('regex'), md.version('pandas'), md.version('pyarrow'), md.version('datasets'), getattr(clip, '__file__', 'ok'), ImageNetInfo.__name__)"
      # ── Cache dirs & symlinks ──────────────────────────────────────────────
      - export NUM_GPUS=${GPUS}
      - export IMAGEREWARD_CACHE=/mnt/data/v-yigu/model_cache/ImageReward
      - export HPS_ROOT=/mnt/data/v-yigu/model_cache/hpsv2
      - mkdir -p /mnt/data/v-yigu/model_cache/hf_cache /mnt/data/v-yigu/model_cache/ImageReward /mnt/data/v-yigu/model_cache/hpsv2 /mnt/data/v-yigu/model_cache/clip
      - mkdir -p /home/aiscuser/.cache
      - ln -sfn /mnt/data/v-yigu/model_cache/clip /home/aiscuser/.cache/clip || true
      - ln -sfn /mnt/data/v-yigu/model_cache/ImageReward /home/aiscuser/.cache/ImageReward || true
      # ── Preload reward + FLUX.1-dev base + RED-AIGC/TDD LoRA ──────────────
      - /opt/conda/envs/ptca/bin/python preload_reward_models.py
      - export HF_HUB_ENABLE_HF_TRANSFER=0
      - /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('black-forest-labs/FLUX.1-dev', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('FLUX.1-dev cache OK')"
      - /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import hf_hub_download; import os; p = hf_hub_download(repo_id='RED-AIGC/TDD', filename='FLUX.1-dev_tdd_adv_lora_weights.safetensors', token=os.environ.get('HF_TOKEN'), resume_download=True); print('TDD LoRA cache OK:', p)"
      - export HF_HUB_OFFLINE=1
      - export TRANSFORMERS_OFFLINE=1
      # ── Run knobs ──────────────────────────────────────────────────────────
      - export OUT_ROOT=/mnt/data/v-yigu/hpsv2_all_models_runs/{run_tag}
      - export PROMPT_FILE=./hpsv2_subset.txt
      - export START_INDEX=0
      - export END_INDEX={num_prompts}
      - export SEED={seed}
      - export STEPS=8
      - export BASELINE_GUIDANCE_SCALE=2.0
      - export N_VARIANTS={n_variants}
      - export CFG_SCALES='{cfg_scales}'
      - export METHODS='{methods}'
      # ── Per-method knobs ──────────────────────────────────────────────────
      # Targeting ≈256 NFE/prompt at STEPS=8 to roughly match DTS (M=32×8).
      # NFE accounting:
      #   baseline    : STEPS                                      = 8
      #   bon         : BON_N × STEPS                              = 32×8  = 256
      #   beam        : BEAM_WIDTH × |cfgs| × N_VARIANTS × STEPS   = 1×1×32×8 = 256
      #   greedy      : N_VARIANTS × STEPS                         = 32×8 = 256
      #   mcts        : N_SIMS × STEPS                             = 32×8 = 256
      #   smc         : SMC_K × STEPS                              = 32×8 = 256
      #   bon_mcts    : (N_SEEDS+N_SIMS) × STEPS  (topk=1,full)    ≈ (16+16)×8 = 256
      #   dts/dts*    : DTS_M_ITER × STEPS                         = 32×8 = 256
      - export BON_N={bon_n}
      - export BEAM_WIDTH={beam_width}
      - export N_SIMS={n_sims}
      - export SMC_K={smc_k}
      - export BON_MCTS_N_SEEDS={bon_mcts_n_seeds}
      - export BON_MCTS_TOPK={bon_mcts_topk}
      - export BON_MCTS_SIM_ALLOC={bon_mcts_sim_alloc}
      - export BON_MCTS_MIN_SIMS={bon_mcts_min_sims}
      - export REWARD_BACKEND=imagereward
      - export REWARD_BACKENDS='{reward_backends}'
      - export EVAL_BACKENDS='{eval_backends}'
      - export EVAL_REWARD_DEVICE=cuda
      - export EVAL_ALLOW_MISSING_BACKENDS=0
      - export USE_QWEN=0
      - export PRECOMPUTE_REWRITES=0
      - export SAVE_BEST_IMAGES=1
      - export SAVE_IMAGES=0
      # ── DTS knobs ──────────────────────────────────────────────────────────
      # M=32 × STEPS=8 = 256 tree-NFE/prompt (matches schnell at M=64×4).
      - export DTS_M_ITER={dts_m_iter}
      - export DTS_LAMBDA={dts_lambda}
      - export DTS_PW_C={dts_pw_c}
      - export DTS_PW_ALPHA={dts_pw_alpha}
      - export DTS_C_UCT={dts_c_uct}
      # Same flow-matching path as schnell (no euler_sampler / x0_sampler set
      # in the tdd_flux backend cfg) → re-noising provides natural per-step
      # stochasticity, so DTS branches without extra SDE noise. Override to
      # >0 if branch diversity collapses in your run.
      - export DTS_SDE_NOISE_SCALE={dts_sde_noise_scale}
      - export DTS_CFG_BANK=''
      # ── Final pin ──────────────────────────────────────────────────────────
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "transformers==4.52.4" "tokenizers==0.21.1" "qwen-vl-utils==0.0.14"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "ftfy>=6.2.3" "regex>=2024.11.6" "xxhash>=3.4.1"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "pandas>=2.1.4" "pyarrow>=14.0.2" "datasets>=2.19.0"
      - /opt/conda/envs/ptca/bin/python -c "import importlib.metadata as md, ftfy, regex, xxhash, pandas, pyarrow, datasets, transformers; print('final pin ok', 'transformers='+md.version('transformers'), md.version('ftfy'), md.version('regex'), md.version('xxhash'), md.version('pandas'), md.version('pyarrow'), md.version('datasets'))"
      # ── Run ────────────────────────────────────────────────────────────────
      - bash hpsv2_flux_schnell_ddp_suite.sh

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: True
        SHARED_MEMORY_PERCENT: 0.5

  max_trials: 1
  type: grid
  params:
    - name: run_tag
      values: [ "flux_tdd_dts_imagereward" ]
    - name: hf_token
      values: [ "YOUR_HF_TOKEN_HERE" ]
    - name: num_prompts
      values: [ 8 ]
    - name: seed
      values: [ 42 ]
    - name: methods
      values: [ "baseline bon beam greedy mcts dts dts_star smc bon_mcts" ]
    - name: reward_backends
      values: [ "imagereward hpsv2 pickscore" ]
    - name: eval_backends
      values: [ "imagereward hpsv2 pickscore" ]
    # Shared knobs (greedy uses N_VARIANTS; beam multiplies by N_VARIANTS × |cfgs|).
    # N_VARIANTS=32 makes greedy hit 256 NFE; BEAM_WIDTH=1 then keeps beam at 256.
    - name: n_variants
      values: [ 32 ]
    - name: cfg_scales
      values: [ "2.0" ]
    # Per-method NFE knobs — targeted at ~256 NFE/prompt (matches DTS M=32×8).
    - name: bon_n
      values: [ 32 ]
    - name: beam_width
      values: [ 1 ]
    - name: n_sims
      values: [ 32 ]
    - name: smc_k
      values: [ 32 ]
    - name: bon_mcts_n_seeds
      values: [ 16 ]
    - name: bon_mcts_topk
      values: [ 1 ]
    - name: bon_mcts_sim_alloc
      values: [ "full" ]
    - name: bon_mcts_min_sims
      values: [ 1 ]
    - name: dts_m_iter
      values: [ 32 ]
    - name: dts_lambda
      values: [ 1.0 ]
    - name: dts_pw_c
      values: [ 1.0 ]
    - name: dts_pw_alpha
      values: [ 0.5 ]
    - name: dts_c_uct
      values: [ 1.0 ]
    - name: dts_sde_noise_scale
      values: [ 0.0 ]
