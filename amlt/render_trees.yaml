description: render-trees-multi

# Lightweight no-GPU job: render ActDiff trees from EXISTING bon_mcts runs
# across multiple backends.  Reads lookahead_node_logs from each run's
# rank_*.jsonl and produces per-prompt PNGs showing CFG choices at every
# denoising step (full 4-level tree).
#
# Output layout (each backend goes to its own subfolder):
#   /mnt/data/v-yigu/_tree_archive/{out_dir_name}/
#   ├── flux_schnell/
#   ├── sid/
#   ├── senseflow_large/
#   └── sd35_base/
#
# Each path is best-effort — if the run_root doesn't exist, that source is
# skipped (logged) and the others continue.  Override individual paths via
# -p flux_root=... etc.

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 1
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: trees-multi-{out_dir_name}
    sku: ${NODES}x${MEM}G${GPUS}-IB
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: false
    command:
      - set -x
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir matplotlib || true
      - export OUT_ROOT=/mnt/data/v-yigu/_tree_archive/{out_dir_name}
      - mkdir -p "$$OUT_ROOT"
      # ---- FLUX-schnell trees ----
      - 'if [ -d "{flux_root}" ]; then echo "[trees] rendering FLUX from {flux_root}"; /opt/conda/envs/ptca/bin/python render_trees_batch.py --run_root "{flux_root}" --method bon_mcts --prompt_range "{prompt_range}" --out_dir "$$OUT_ROOT/flux_schnell" --title_prefix "ActDiff (FLUX-schnell)" || true; else echo "[trees] SKIP FLUX -- run_root not found: {flux_root}"; fi'
      # ---- SiD trees ----
      - 'if [ -d "{sid_root}" ]; then echo "[trees] rendering SiD from {sid_root}"; /opt/conda/envs/ptca/bin/python render_trees_batch.py --run_root "{sid_root}" --method bon_mcts --prompt_range "{prompt_range}" --out_dir "$$OUT_ROOT/sid" --title_prefix "ActDiff (SiD-DiT-SD3.5L)" || true; else echo "[trees] SKIP SiD -- run_root not found: {sid_root}"; fi'
      # ---- SenseFlow trees ----
      - 'if [ -d "{senseflow_root}" ]; then echo "[trees] rendering SenseFlow from {senseflow_root}"; /opt/conda/envs/ptca/bin/python render_trees_batch.py --run_root "{senseflow_root}" --method bon_mcts --prompt_range "{prompt_range}" --out_dir "$$OUT_ROOT/senseflow_large" --title_prefix "ActDiff (SenseFlow-large)" || true; else echo "[trees] SKIP SenseFlow -- run_root not found: {senseflow_root}"; fi'
      # ---- SD3.5-base trees ----
      - 'if [ -d "{sd35_base_root}" ]; then echo "[trees] rendering SD3.5-base from {sd35_base_root}"; /opt/conda/envs/ptca/bin/python render_trees_batch.py --run_root "{sd35_base_root}" --method bon_mcts --prompt_range "{prompt_range}" --out_dir "$$OUT_ROOT/sd35_base" --title_prefix "ActDiff (SD3.5-base 28-step)" || true; else echo "[trees] SKIP SD3.5-base -- run_root not found: {sd35_base_root}"; fi'
      - echo "[trees] all sources done. Browse: $$OUT_ROOT"
      - ls -la "$$OUT_ROOT" || true
      - find "$$OUT_ROOT" -name '*.png' | head -20

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: "true"

  max_trials: 1
  type: grid
  params:
    - name: out_dir_name
      values: [ "multi_backend_trees" ]
    - name: prompt_range
      values: [ "0:20" ]
    # ---- Per-backend run roots (override individually with -p flux_root=... etc.) ----
    - name: flux_root
      values: [ "/mnt/data/v-yigu/all_in_one/flux-newcfg/composite/flux_schnell/seed42" ]
    - name: sid_root
      # The step-reward-test was a bon_mcts run on sid.
      values: [ "/mnt/data/v-yigu/all_method_ablations/step-reward-test" ]
    - name: senseflow_root
      # If you have a senseflow_large run, point this at it.  Otherwise the
      # source is silently skipped.
      values: [ "/mnt/data/v-yigu/composite_all/composite-all/senseflow_large" ]
    - name: sd35_base_root
      values: [ "/mnt/data/v-yigu/composite_all/composite-all/sd35_base" ]
