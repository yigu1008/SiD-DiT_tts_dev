description: render-trees-multi

# Lightweight no-GPU job: render ActDiff trees from EXISTING bon_mcts runs
# across multiple backends.  Reads lookahead_node_logs from each run's
# rank_*.jsonl and produces per-prompt PNGs showing CFG choices at every
# denoising step (full 4-level tree).
#
# Output layout:
#   /mnt/data/v-yigu/_tree_archive/{out_dir_name}/
#   {flux_schnell, sid, senseflow_large, sd35_base}/
#
# Each path is best-effort -- if the run_root doesn't exist, that source is
# skipped (logged) and the others continue.

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 1
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: trees-multi-{out_dir_name}
    sku: ${NODES}x${MEM}G${GPUS}-IB
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: false
    command:
      - set -x
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir matplotlib || true
      - export OUT_ROOT=/mnt/data/v-yigu/_tree_archive/{out_dir_name}
      - export PROMPT_RANGE={prompt_range}
      - export FLUX_ROOT={flux_root}
      - export SID_ROOT={sid_root}
      - export SENSEFLOW_ROOT={senseflow_root}
      - export SD35_BASE_ROOT={sd35_base_root}
      - bash render_trees_multi.sh

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: "true"

  max_trials: 1
  type: grid
  params:
    - name: hf_token
      values: [ "YOUR_HF_TOKEN_HERE" ]
    - name: out_dir_name
      values: [ "multi_backend_trees" ]
    - name: prompt_range
      values: [ "0:20" ]
    - name: flux_root
      values: [ "/mnt/data/v-yigu/all_in_one/flux-newcfg/composite/flux_schnell/seed42" ]
    - name: sid_root
      values: [ "/mnt/data/v-yigu/all_method_ablations/step-reward-test" ]
    - name: senseflow_root
      values: [ "/mnt/data/v-yigu/composite_all/composite-all/senseflow_large" ]
    - name: sd35_base_root
      values: [ "/mnt/data/v-yigu/composite_all/composite-all/sd35_base" ]
