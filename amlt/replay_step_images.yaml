description: replay-step-images

# Replay each prompt's MCTS winning action sequence and dump the decoded
# x_0 image after every denoising step.  Output: one PNG per (prompt, step).
#
# No re-MCTS — reads existing diagnostics, just re-runs the pipeline on the
# winning (variant, cfg) sequence with image saving enabled at each step.
#
# Output: /mnt/data/v-yigu/_tree_archive/{out_dir_name}/prompt_NNNN/
#   step_0_cfgX.XX_vN.png   <- x_0 after step 0
#   step_1_cfgX.XX_vN.png
#   step_2_cfgX.XX_vN.png
#   step_3_cfgX.XX_vN.png
#   final.png

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub hpsv2

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: replay-step-{out_dir_name}
    sku: ${NODES}x${MEM}G${GPUS}
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: false
    command:
      - set -x
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install --upgrade "setuptools>=70,<76" wheel
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "xxhash>=3.4.1" "ftfy>=6.2.3" "regex>=2024.11.6" "tqdm>=4.66.4"
      - export HF_HUB_OFFLINE=1
      - export TRANSFORMERS_OFFLINE=1
      - export OUT_DIR=/mnt/data/v-yigu/_tree_archive/{out_dir_name}
      - mkdir -p "$$OUT_DIR"
      - /opt/conda/envs/ptca/bin/python replay_winner_step_images.py --run_root "{run_root}" --method {method} --backend {backend} --prompt_range "{prompt_range}" --out_dir "$$OUT_DIR" --height 1024 --width 1024
      - echo "[replay] done. Browse: $$OUT_DIR"
      - find "$$OUT_DIR" -name '*.png' | head -30

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: "true"

  max_trials: 1
  type: grid
  params:
    - name: hf_token
      values: [ "YOUR_HF_TOKEN_HERE" ]
    - name: out_dir_name
      values: [ "step_images_flux" ]
    - name: run_root
      values: [ "/mnt/data/v-yigu/all_in_one/flux-newcfg/composite/flux_schnell/seed42" ]
    - name: method
      values: [ "bon_mcts" ]
    - name: backend
      # Set to: sid / senseflow_large / sd35_base / flux_schnell
      values: [ "flux_schnell" ]
    - name: prompt_range
      values: [ "0:10" ]
