description: sd35-all-algorithms-reward-correction

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub hpsv2
    - pip list

code:
  local_dir: ../

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: sd35-correction-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}-IB
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: False
    command:
      - set -x
      - unset REWARD_BACKEND REWARD_TYPE REWARD_BACKENDS || true
      # ── Paths ──────────────────────────────────────────────────────────────
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export AZFUSE_USE_FUSE=0
      - export NCCL_ASYNC_ERROR_HANDLING=0
      - export NCCL_P2P_LEVEL=NVL
      # ── Install deps ───────────────────────────────────────────────────────
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install --upgrade "setuptools>=70,<76" wheel
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - /opt/conda/envs/ptca/bin/python -c "import os, torch; print('[torch-check]', torch.__version__, 'cuda=', torch.version.cuda, 'is_available=', torch.cuda.is_available(), 'count=', torch.cuda.device_count()); assert torch.cuda.is_available() and (torch.version.cuda is not None), 'CPU-only torch detected'"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --force-reinstall --no-deps "xformers==0.0.31.post1" || true
      - /opt/conda/envs/ptca/bin/python -c "import xformers, xformers.ops; print('xformers ok', xformers.__version__)" || (/opt/conda/envs/ptca/bin/pip uninstall -y xformers && echo 'xformers disabled')
      - /opt/conda/envs/ptca/bin/pip install hpsv2 huggingface_hub "regex>=2024.11.6" "ftfy>=6.2.3" "xxhash>=3.4.1"
      - /opt/conda/envs/ptca/bin/pip install "xxhash>=3.4.1" "ftfy>=6.2.3" "regex>=2024.11.6" "tqdm>=4.66.4"
      - PYTHON_BIN=/opt/conda/envs/ptca/bin/python bash install_reward_deps.sh
      - if [ "$$ENABLE_OVERLAY_PYDEPS" = "1" ]; then PYTHON_BIN=/opt/conda/envs/ptca/bin/python SID_OVERLAY_DIR=/tmp/$$USER/sid_pydeps bash prepare_cluster_overlay_deps.sh; export SID_EXTRA_PYTHONPATH=/tmp/$$USER/sid_pydeps/py$$(/opt/conda/envs/ptca/bin/python -c "import sys; print(str(sys.version_info.major)+'.'+str(sys.version_info.minor))"); else unset SID_EXTRA_PYTHONPATH || true; fi
      # Re-install after reward deps in case install_reward_deps.sh overwrote them
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --force-reinstall --no-deps "xxhash>=3.4.1" "ftfy>=6.2.3" "regex>=2024.11.6" "tqdm>=4.66.4"
      - /opt/conda/envs/ptca/bin/python -c "import importlib.metadata as md, xxhash, clip, ftfy, regex; from timm.data import ImageNetInfo; print('reward deps ok', md.version('xxhash'), md.version('ftfy'), md.version('regex'), getattr(clip, '__file__', 'ok'), ImageNetInfo.__name__)"
      # ── Cache dirs & symlinks ──────────────────────────────────────────────
      - export NUM_GPUS=${GPUS}
      - export IMAGEREWARD_CACHE=/mnt/data/v-yigu/model_cache/ImageReward
      - export HPS_ROOT=/mnt/data/v-yigu/model_cache/hpsv2
      - mkdir -p /mnt/data/v-yigu/model_cache/hf_cache /mnt/data/v-yigu/model_cache/ImageReward /mnt/data/v-yigu/model_cache/hpsv2 /mnt/data/v-yigu/model_cache/clip
      - mkdir -p /home/aiscuser/.cache && ln -sfn /mnt/data/v-yigu/model_cache/clip /home/aiscuser/.cache/clip || true
      # ── Preload reward models & SD3.5 weights ─────────────────────────────
      - /opt/conda/envs/ptca/bin/python preload_reward_models.py
      - /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('YGu1998/SiD-DiT-SD3.5-large', cache_dir=os.environ.get('HF_HOME')); print('SD3.5 cache OK')"
      - export HF_HUB_OFFLINE=1
      - export TRANSFORMERS_OFFLINE=1
      # ── Prompt file ────────────────────────────────────────────────────────
      - export HPSV2_PROMPT_DIR=/mnt/data/v-yigu/hpsv2_prompt_cache
      - export PROMPT_STYLE={prompt_style}
      - OUT_DIR="$$HPSV2_PROMPT_DIR" STYLE="$$PROMPT_STYLE" bash get_hpsv2_prompts.sh
      - if [ "$$PROMPT_STYLE" = "all" ]; then export PROMPT_FILE="$$HPSV2_PROMPT_DIR/hpsv2_prompts.txt"; else export PROMPT_FILE="$$HPSV2_PROMPT_DIR/hpsv2_prompts_$$PROMPT_STYLE.txt"; fi
      - if [ {use_subset} = 1 ]; then export PROMPT_FILE=./hpsv2_subset.txt; fi
      # ── Run ───────────────────────────────────────────────────────────────
      - export OUT_ROOT=/mnt/data/v-yigu/hpsv2_all_models_runs/{run_tag}
      - export START_INDEX={start_index}
      - export END_INDEX={end_index}
      - export METHODS='{methods}'
      - export REWARD_BACKEND=imagereward
      - export REWARD_TYPE=imagereward
      - export REWARD_BACKENDS=imagereward
      - export EVAL_BEST_IMAGES=1
      - export EVAL_BACKENDS='{eval_backends}'
      - export EVAL_REWARD_DEVICE=cpu
      - export EVAL_ALLOW_MISSING_BACKENDS=0
      - export CFG_SCALES='{cfg_scales}'
      - export BASELINE_CFG={baseline_cfg}
      - export STEPS={steps}
      - export N_VARIANTS={n_variants}
      - export N_SIMS={n_sims}
      - export UCB_C={ucb_c}
      - export SMC_K={smc_k}
      - export SMC_GAMMA={smc_gamma}
      - export ESS_THRESHOLD={ess_threshold}
      - export RESAMPLE_START_FRAC={resample_start_frac}
      - export SMC_CFG_SCALE={smc_cfg_scale}
      - export SMC_VARIANT_IDX={smc_variant_idx}
      - export GA_POPULATION={ga_population}
      - export GA_GENERATIONS={ga_generations}
      - export GA_ELITES={ga_elites}
      - export GA_MUTATION_PROB={ga_mutation_prob}
      - export GA_TOURNAMENT_K={ga_tournament_k}
      - export GA_SELECTION={ga_selection}
      - export GA_RANK_PRESSURE={ga_rank_pressure}
      - export GA_CROSSOVER={ga_crossover}
      - export GA_LOG_TOPK={ga_log_topk}
      - export GA_EVAL_BATCH={ga_eval_batch}
      - export CORRECTION_STRENGTHS='{correction_strengths}'
      - export SEED={seed}
      - export RUN_SANA=0
      - export RUN_SD35=1
      - export RUN_FLUX=0
      - export USE_QWEN={use_qwen}
      - export PRECOMPUTE_REWRITES={precompute_rewrites}
      - export REWRITES_OVERWRITE={rewrites_overwrite}
      - export QWEN_PRECOMPUTE_DEVICE={qwen_precompute_device}
      - export QWEN_PRECOMPUTE_BATCH_SIZE={qwen_precompute_batch_size}
      - export QWEN_PRECOMPUTE_SAVE_EVERY={qwen_precompute_save_every}
      - export QWEN_PRECOMPUTE_CLEAR_CACHE={qwen_precompute_clear_cache}
      - mkdir -p /mnt/data/v-yigu/hpsv2_rewrite_cache
      - export REWRITES_FILE=/mnt/data/v-yigu/hpsv2_rewrite_cache/{run_tag}_$$PROMPT_STYLE_{start_index}_{end_index}.json
      - export SAVE_IMAGES={save_images}
      - export SAVE_BEST_IMAGES={save_best_images}
      - export SAVE_VARIANTS=0
      # ── Final pin: restore packages that earlier installs may have downgraded ──
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --force-reinstall --no-deps "ftfy>=6.2.3" "regex>=2024.11.6" "xxhash>=3.4.1"
      - /opt/conda/envs/ptca/bin/python -c "import importlib.metadata as md, ftfy, regex, xxhash; print('final pin ok', md.version('ftfy'), md.version('regex'), md.version('xxhash'))"
      - bash hpsv2_sd35_flux_allalgos.sh

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: True
        SHARED_MEMORY_PERCENT: 0.5

  max_trials: 1
  type: grid
  params:
    - name: run_tag
      values: [ "sd35_reward_correction" ]
    - name: prompt_style
      values: [ "all" ]
    - name: start_index
      values: [ 0 ]
    - name: end_index
      values: [ -1 ]
    - name: use_subset
      values: [ 1 ]
    - name: methods
      values: [ "baseline greedy mcts ga smc" ]
    - name: eval_backends
      values: [ "imagereward hpsv2 pickscore" ]
    - name: cfg_scales
      values: [ "1.0 1.25 1.5 1.75 2.0 2.25 2.5" ]
    - name: baseline_cfg
      values: [ 1.0 ]
    - name: steps
      values: [ 4 ]
    - name: n_variants
      values: [ 3 ]
    - name: n_sims
      values: [ 50 ]
    - name: ucb_c
      values: [ 1.41 ]
    - name: smc_k
      values: [ 8 ]
    - name: smc_gamma
      values: [ 0.10 ]
    - name: ess_threshold
      values: [ 0.5 ]
    - name: resample_start_frac
      values: [ 0.3 ]
    - name: smc_cfg_scale
      values: [ 1.25 ]
    - name: smc_variant_idx
      values: [ 0 ]
    - name: ga_population
      values: [ 24 ]
    - name: ga_generations
      values: [ 8 ]
    - name: ga_elites
      values: [ 4 ]
    - name: ga_mutation_prob
      values: [ 0.15 ]
    - name: ga_tournament_k
      values: [ 4 ]
    - name: ga_selection
      values: [ "rank" ]
    - name: ga_rank_pressure
      values: [ 1.7 ]
    - name: ga_crossover
      values: [ "uniform" ]
    - name: ga_log_topk
      values: [ 5 ]
    - name: ga_eval_batch
      values: [ 2 ]
    - name: correction_strengths
      values: [ "0.0 1.0" ]
    - name: seed
      values: [ 42 ]
    - name: save_images
      values: [ 0 ]
    - name: save_best_images
      values: [ 1 ]
    - name: use_qwen
      values: [ 1 ]
    - name: precompute_rewrites
      values: [ 1 ]
    - name: rewrites_overwrite
      values: [ 0 ]
    - name: qwen_precompute_device
      values: [ "auto" ]
    - name: qwen_precompute_batch_size
      values: [ 16 ]
    - name: qwen_precompute_save_every
      values: [ 1 ]
    - name: qwen_precompute_clear_cache
      values: [ 1 ]
