description: sd35-reward-eval-multi-sd35

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 1
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: sd35-reward-eval-sd35-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}-IB
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: False
    command:
      - set -x
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export SID_FORCE_WANDB_STUB=1
      - export WANDB_DISABLED=true
      - export TOKENIZERS_PARALLELISM=false
      # ── Paths & HF auth ────────────────────────────────────────────────────
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - unset HF_HUB_OFFLINE TRANSFORMERS_OFFLINE || true
      # ── Build the isolated `reward` conda env (transformers==4.45.2) ───────
      # This env is independent from ptca's conda env. Avoids torchvision /
      # wandb / qwen version conflicts seen when running eval in ptca.
      - source /opt/conda/etc/profile.d/conda.sh
      - CONDA_BASE=/opt/conda REWARD_ENV_NAME=reward bash setup_reward_env.sh
      - export REWARD_PY=/opt/conda/envs/reward/bin/python
      - "$$REWARD_PY" -c "import torch, transformers; print('reward env torch='+torch.__version__, 'transformers='+transformers.__version__); import hpsv3, hpsv2, ImageReward; print('reward env backends import OK')"
      # ── Cache dirs & symlinks ──────────────────────────────────────────────
      - export IMAGEREWARD_CACHE=/mnt/data/v-yigu/model_cache/ImageReward
      - export HPS_ROOT=/mnt/data/v-yigu/model_cache/hpsv2
      - export CLIP_CACHE_DIR=/mnt/data/v-yigu/model_cache/clip
      - mkdir -p /mnt/data/v-yigu/model_cache/ImageReward /mnt/data/v-yigu/model_cache/hpsv2 /mnt/data/v-yigu/model_cache/clip
      - mkdir -p /home/aiscuser/.cache
      - ln -sfn /mnt/data/v-yigu/model_cache/clip /home/aiscuser/.cache/clip || true
      - ln -sfn /mnt/data/v-yigu/model_cache/ImageReward /home/aiscuser/.cache/ImageReward || true
      # ── Preload reward model weights (use reward env's python) ────────────
      - export REWARD_BACKENDS='{eval_backends}'
      - "$$REWARD_PY" preload_reward_models.py
      # ── Run eval for each method (uses reward env python) ─────────────────
      - export SOURCE_RUN_TAG={source_run_tag}
      - export SOURCE_MODEL={source_model}
      - export SOURCE_REWARD_BACKEND={source_reward_backend}
      - export METHOD_PARENT={method_parent}
      - export EVAL_DEVICE={eval_device}
      - export EVAL_BACKENDS='{eval_backends}'
      - export METHODS='{methods}'
      - export LAYOUT={layout}
      - |
        BASE1="/mnt/data/v-yigu/hpsv2_all_models_runs/$$SOURCE_RUN_TAG/$$SOURCE_MODEL/$$SOURCE_REWARD_BACKEND"
        BASE2="/mnt/data/v-yigu/hpsv2_all_models_runs/$$SOURCE_RUN_TAG/$$SOURCE_MODEL"
        BASE3="/mnt/data/v-yigu/hpsv2_all_models_runs/$$SOURCE_RUN_TAG"
        RUN_PARENTS=()

        if [ "$$METHOD_PARENT" = "auto_all" ] || [ "$$METHOD_PARENT" = "AUTO_ALL" ]; then
          for base in "$$BASE1" "$$BASE2" "$$BASE3"; do
            if [ -d "$$base" ]; then
              while IFS= read -r run_dir; do
                [ -n "$$run_dir" ] && RUN_PARENTS+=("$$run_dir")
              done < <(ls -dt "$$base"/run_* 2>/dev/null || true)
            fi
            if [ "$${#RUN_PARENTS[@]}" -gt 0 ]; then
              break
            fi
          done
        elif [ "$$METHOD_PARENT" = "auto" ] || [ "$$METHOD_PARENT" = "AUTO" ]; then
          for base in "$$BASE1" "$$BASE2" "$$BASE3"; do
            if [ -d "$$base" ]; then
              latest="$$(ls -dt "$$base"/run_* 2>/dev/null | head -1 || true)"
              if [ -n "$$latest" ]; then
                RUN_PARENTS=("$$latest")
                break
              fi
            fi
          done
        else
          RUN_PARENTS=("$$METHOD_PARENT")
        fi

        if [ "$${#RUN_PARENTS[@]}" -eq 0 ]; then
          echo "ERROR: no run directories resolved for METHOD_PARENT=$$METHOD_PARENT"
          echo "List available dirs:"
          ls -d /mnt/data/v-yigu/hpsv2_all_models_runs/$$SOURCE_RUN_TAG/*/ 2>/dev/null || echo "(none)"
          exit 1
        fi
        echo "source_run_tag=$$SOURCE_RUN_TAG source_model=$$SOURCE_MODEL source_reward_backend=$$SOURCE_REWARD_BACKEND"
        echo "run_count=$${#RUN_PARENTS[@]} layout=$$LAYOUT methods=$$METHODS"
        for RUN_PARENT in "$${RUN_PARENTS[@]}"; do
          if [ ! -d "$$RUN_PARENT" ]; then
            echo "SKIP: run dir missing $$RUN_PARENT"
            continue
          fi
          echo "Evaluating run_dir=$$RUN_PARENT"
          for method in $$METHODS; do
            METHOD_DIR="$$RUN_PARENT/$$method"
            if [ ! -d "$$METHOD_DIR" ]; then
              echo "SKIP: $$METHOD_DIR does not exist"
              continue
            fi
            OUT_JSON="$$METHOD_DIR/reward_eval_$$(echo $$EVAL_BACKENDS | tr ' ' '_').json"
            echo "EVAL: method=$$method dir=$$METHOD_DIR backends=$$EVAL_BACKENDS"
            "$$REWARD_PY" evaluate_best_images_multi_reward.py \
              --layout "$$LAYOUT" \
              --method_out "$$METHOD_DIR" \
              --method "$$method" \
              --backends $$EVAL_BACKENDS \
              --reward_device "$$EVAL_DEVICE" \
              --image_reward_model ImageReward-v1.0 \
              --pickscore_model yuvalkirstain/PickScore_v1 \
              --allow_missing_backends \
              --out_json "$$OUT_JSON" \
              || echo "WARN: eval failed for method=$$method run=$$RUN_PARENT"
            echo "DONE: $$OUT_JSON"
          done
        done
      - echo "All evaluations complete."

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: True
        SHARED_MEMORY_PERCENT: 0.5

  max_trials: 10
  type: grid
  params:
    - name: run_tag
      values: [ "reward_eval_multi_sd35" ]
    - name: hf_token
      values: [ "YOUR_HF_TOKEN_HERE" ]
    - name: source_run_tag
      values: [ "senseflow_smc_expansion_hpsv3_server" ]
    - name: source_model
      values: [ "sd35" ]
    - name: source_reward_backend
      values: [ "hpsv3" ]
    # method_parent values:
    #   auto_all: evaluate every run_* under the resolved source path
    #   auto:     evaluate only latest run_*
    #   <path>:   evaluate an explicit run dir
    #
    # Resolved source path:
    # /mnt/data/v-yigu/hpsv2_all_models_runs/<source_run_tag>/<source_model>/<source_reward_backend>/
    - name: method_parent
      values: [ "auto_all" ]
    - name: layout
      values: [ "sd35" ]
    # Space-separated method names matching subdirs under method_parent
    - name: methods
      values: [ "baseline smc" ]
    # Backends supported in reward env: imagereward hpsv2 pickscore hpsv3
    - name: eval_backends
      values: [ "hpsv3 imagereward hpsv2 pickscore" ]
    - name: eval_device
      values: [ "cuda" ]
