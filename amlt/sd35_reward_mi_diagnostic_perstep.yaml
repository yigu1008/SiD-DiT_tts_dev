description: sd35-reward-mi-diagnostic-perstep

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: sd35-mi-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: false
    command:
      - set -euo pipefail
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - export WANDB_DISABLED=true
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install --upgrade "setuptools>=70,<76" wheel
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - PYTHON_BIN=/opt/conda/envs/ptca/bin/python bash install_reward_deps.sh
      # install_reward_deps.sh only WARNs on ImageReward install failure. Force
      # a verifiable install so the job fails fast (rather than at reward-load).
      - /opt/conda/envs/ptca/bin/python -c "import ImageReward" 2>/dev/null || /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps --no-build-isolation "git+https://github.com/THUDM/ImageReward.git" || /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "image-reward==1.5"
      - /opt/conda/envs/ptca/bin/python -c "import ImageReward; print('[verify] ImageReward', ImageReward.__file__)"
      - /opt/conda/envs/ptca/bin/python preload_reward_models.py
      - /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('YGu1998/SiD-DiT-SD3.5-large', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('SD3.5-SiD cache OK')"
      - if [ {use_qwen} = 1 ]; then /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('Qwen/Qwen3-4B', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('Qwen cache OK')"; fi
      - export NUM_GPUS=${GPUS}
      - export OUT_DIR=/mnt/data/v-yigu/hpsv2_all_models_runs/{run_tag}/mi_diagnostic
      - export SHARD_DIR=$$OUT_DIR/shards
      - mkdir -p $$OUT_DIR $$SHARD_DIR
      - export MODE={mode}
      - export PROMPT_FILE=./hpsv2_subset.txt
      - export N_PROMPTS={n_prompts}
      - export N_SEEDS={n_seeds}
      - export N_REWRITES={n_rewrites}
      - export CFG_SCALES='{cfg_scales}'
      - export DEFAULT_CFG={default_cfg}
      - export BACKEND={sd35_backend}
      - export STEPS={steps}
      - export REWARD_BACKEND={reward_backend}
      - export USE_QWEN={use_qwen}
      - export MINE_STEPS={mine_steps}
      - export MINE_BATCH_SIZE={mine_batch_size}
      - export MINE_RESTARTS={mine_restarts}
      - export MINE_DEVICE=cuda
      - export MINE_ESTIMATOR={mine_estimator}
      - export MINE_EARLY_STOP_PATIENCE={mine_early_stop_patience}
      - export DATASET_CSV=$$OUT_DIR/mi_diag_sd35_dataset.csv
      - export REPORT_JSON=$$OUT_DIR/mi_diag_sd35_report.json
      - export TABLE_CSV=$$OUT_DIR/mi_diag_sd35_table.csv
      - export PER_STEP_DATASET_CSV=$$OUT_DIR/mi_perstep_sd35_dataset.csv
      - export PER_STEP_REPORT_JSON=$$OUT_DIR/mi_perstep_sd35_report.json
      - export PER_STEP_TABLE_CSV=$$OUT_DIR/mi_perstep_sd35_table.csv
      - export PER_STEP_PLOT_PNG=$$OUT_DIR/mi_perstep_sd35_curve.png
      - export PER_STEP_BASELINE_VARIANT={per_step_baseline_variant}
      - export PER_STEP_N_NOISE={per_step_n_noise}
      - export PER_STEP_NOISE_SEED_BASE={per_step_noise_seed_base}
      - export PER_STEP_TEST_FRAC={per_step_test_frac}
      - export PER_STEP_UNCLAMPED={per_step_unclamped}
      - export PER_STEP_CRN_RESIDUALIZE={per_step_crn_residualize}
      # Calibration guard: cheap synthetic pre-flight on the estimator+null+split
      # (no diffusion). random control (signal=0) MI must sit in the null band of
      # 0; correlated control (signal>0) MI must be clearly positive. SystemExit
      # on miscalibration so we fail BEFORE burning 8-GPU generation hours.
      - if [ {run_calibrate} = 1 ]; then /opt/conda/envs/ptca/bin/python sd35_reward_mi_diagnostic.py --mode per_step_calibrate --n_prompts {n_prompts} --n_seeds {n_seeds} --n_rewrites {n_rewrites} --mine_estimator {mine_estimator} --mine_steps {mine_steps} --mine_batch_size {mine_batch_size} --mine_restarts {mine_restarts} --mine_device cuda --per_step_test_frac {per_step_test_frac} $$([ {per_step_unclamped} = 1 ] && echo --per_step_unclamped || echo --no-per_step_unclamped); fi
      # 8-GPU sharded driver: splits prompts NUM_GPUS ways, runs N parallel
      # generate processes pinned to GPU 0..N-1, merges shard CSVs with globally
      # unique prompt_id, then runs MINE training once on the merged CSV.
      - bash run_sd35_reward_mi_diagnostic_8gpu.sh

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: "true"

  type: grid
  max_trials: 1
  params:
    - name: mode
      values:
        - "per_step"       # full: generate OSD dataset + MINE critics + variance/paired decompose
        - "per_step_train" # reuse existing dataset: MINE critics + variance/paired decompose only (no regen)
    - name: run_tag
      values:
        - "sd35_reward_mi_diagnostic_perstep"
    - name: hf_token
      values:
        - "YOUR_HF_TOKEN_HERE"
    - name: n_prompts
      values:
        - 50
    - name: n_seeds
      values:
        - 16
    - name: n_rewrites
      values:
        - 3
    - name: cfg_scales
      values:
        - "1.0 1.25 1.5 1.75 2.0 2.5"
    - name: default_cfg
      values:
        - 1.0
    - name: sd35_backend
      values:
        - "sid"
    - name: steps
      values:
        - 4
    - name: reward_backend
      values:
        - "imagereward"
    - name: use_qwen
      values:
        - 1
    - name: mine_steps
      values:
        - 10000
    - name: mine_batch_size
      values:
        - 1024
    - name: mine_restarts
      values:
        - 3
    - name: mine_estimator
      values:
        - "infonce" # infonce (per-prompt KxK block, bound capped at log K) | smile | dv
    - name: mine_early_stop_patience
      values:
        - 8
    - name: per_step_baseline_variant
      values:
        - 0
    - name: per_step_n_noise
      values:
        - 16 # CRN noise-channel realizations per step (0 disables the noise channel)
    - name: per_step_noise_seed_base
      values:
        - 900000
    - name: per_step_test_frac
      values:
        - 0.2 # held-out test split; MI reported on it only
    - name: per_step_unclamped
      values:
        - 1 # 1 -> report raw mi_real-mi_null (no max(0,.), no H(C) clamp)
    - name: per_step_crn_residualize
      values:
        - 1 # 1 -> center reward within (prompt,seed) CRN blocks; estimator reports conditional MI I(action;R|prompt,seed) instead of seed-swamped marginal MI
    - name: run_calibrate
      values:
        - 1 # 1 -> run synthetic calibration guard before the full grid
