description: senseflow-smc-expansion-imagereward

# Variant-expansion DAS-SMC evaluation for SenseFlow-large on ImageReward.
# Enables K→K·M fan-out at resample points over a bank of variants (CFG is not
# used by SenseFlow, so the expansion bank only varies variant index).

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub hpsv2
    - pip list

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: senseflow-smc-exp-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}-IB
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: False
    command:
      - set -x
      - unset REWARD_BACKEND REWARD_TYPE REWARD_BACKENDS || true
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export SID_FORCE_WANDB_STUB=1
      - export WANDB_DISABLED=true
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - export SD35_BACKEND={sd35_backend}
      - export AZFUSE_USE_FUSE=0
      - export NCCL_ASYNC_ERROR_HANDLING=0
      - export NCCL_P2P_LEVEL=NVL
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install --upgrade "setuptools>=70,<76" wheel
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - /opt/conda/envs/ptca/bin/python -c "import os, torch; print('[torch-check]', torch.__version__, 'cuda=', torch.version.cuda, 'is_available=', torch.cuda.is_available(), 'count=', torch.cuda.device_count(), 'cvd=', os.environ.get('CUDA_VISIBLE_DEVICES', '<unset>')); assert torch.cuda.is_available() and (torch.version.cuda is not None), 'CPU-only torch detected after requirements install'"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --force-reinstall --no-deps "xformers==0.0.31.post1" || true
      - /opt/conda/envs/ptca/bin/python -c "import xformers, xformers.ops; print('xformers ok', xformers.__version__)" || (/opt/conda/envs/ptca/bin/pip uninstall -y xformers && echo 'xformers disabled')
      - PYTHON_BIN=/opt/conda/envs/ptca/bin/python bash install_reward_deps.sh
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "xxhash>=3.4.1" "ftfy>=6.2.3" "regex>=2024.11.6" "tqdm>=4.66.4"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "pandas>=2.1.4" "pyarrow>=14.0.2" "datasets>=2.19.0"
      - /opt/conda/envs/ptca/bin/python -c "import importlib.metadata as md, xxhash, clip, ftfy, regex, pandas, pyarrow, datasets; from timm.data import ImageNetInfo; print('reward deps ok', md.version('xxhash'), md.version('ftfy'), md.version('regex'), md.version('pandas'), md.version('pyarrow'), md.version('datasets'), getattr(clip, '__file__', 'ok'), ImageNetInfo.__name__)"
      - export NUM_GPUS=${GPUS}
      - export IMAGEREWARD_CACHE=/mnt/data/v-yigu/model_cache/ImageReward
      - export HPS_ROOT=/mnt/data/v-yigu/model_cache/hpsv2
      - mkdir -p /mnt/data/v-yigu/model_cache/hf_cache /mnt/data/v-yigu/model_cache/ImageReward /mnt/data/v-yigu/model_cache/hpsv2 /mnt/data/v-yigu/model_cache/clip
      - mkdir -p /home/aiscuser/.cache
      - ln -sfn /mnt/data/v-yigu/model_cache/clip /home/aiscuser/.cache/clip || true
      - ln -sfn /mnt/data/v-yigu/model_cache/ImageReward /home/aiscuser/.cache/ImageReward || true
      - /opt/conda/envs/ptca/bin/python preload_reward_models.py
      - export HF_HUB_ENABLE_HF_TRANSFER=0
      - /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('stabilityai/stable-diffusion-3.5-large', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('SD3.5-large cache OK')"
      - /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('domiso/SenseFlow', token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('SenseFlow cache OK')"
      - if [ {use_qwen} = 1 ]; then /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os; snapshot_download('Qwen/Qwen3-4B', token=os.environ.get('HF_TOKEN')); print('Qwen cache OK')"; fi
      - export HF_HUB_OFFLINE=1
      - export TRANSFORMERS_OFFLINE=1
      - export HPSV2_PROMPT_DIR=/mnt/data/v-yigu/hpsv2_prompt_cache
      - export PROMPT_STYLE={prompt_style}
      - OUT_DIR="$$HPSV2_PROMPT_DIR" STYLE="$$PROMPT_STYLE" bash get_hpsv2_prompts.sh
      - if [ "$$PROMPT_STYLE" = "all" ]; then export PROMPT_FILE="$$HPSV2_PROMPT_DIR/hpsv2_prompts.txt"; else export PROMPT_FILE="$$HPSV2_PROMPT_DIR/hpsv2_prompts_$$PROMPT_STYLE.txt"; fi
      - if [ {use_subset} = 1 ]; then export PROMPT_FILE=./hpsv2_subset.txt; fi
      - export OUT_ROOT=/mnt/data/v-yigu/hpsv2_all_models_runs/{run_tag}
      - export START_INDEX={start_index}
      - export END_INDEX={end_index}
      - export METHODS='{methods}'
      - export REWARD_BACKEND=imagereward
      - export REWARD_TYPE=imagereward
      - export REWARD_BACKENDS='{reward_backends}'
      - export EVAL_BEST_IMAGES=1
      - export EVAL_BACKENDS='{eval_backends}'
      - export EVAL_REWARD_DEVICE=cuda
      - export EVAL_ALLOW_MISSING_BACKENDS=0
      # SenseFlow uses no CFG; suite auto-overrides these to 0.0 for senseflow backends.
      - export CFG_SCALES='{cfg_scales}'
      - export BASELINE_CFG={baseline_cfg}
      - export STEPS={steps}
      - export N_VARIANTS={n_variants}
      - export SMC_K={smc_k}
      - export SMC_GAMMA={smc_gamma}
      - export ESS_THRESHOLD={ess_threshold}
      - export RESAMPLE_START_FRAC={resample_start_frac}
      - export SMC_CFG_SCALE={smc_cfg_scale}
      - export SMC_VARIANT_IDX={smc_variant_idx}
      # ── SMC variant-expansion knobs ──────────────────────────────────────
      - export SMC_VARIANT_EXPANSION={smc_variant_expansion}
      - export SMC_EXPANSION_VARIANTS='{smc_expansion_variants}'
      - export SMC_EXPANSION_CFGS='{smc_expansion_cfgs}'
      - export SMC_EXPANSION_CS='{smc_expansion_cs}'
      - export SMC_EXPANSION_FACTOR={smc_expansion_factor}
      - export SMC_EXPANSION_PROPOSAL={smc_expansion_proposal}
      - export SMC_EXPANSION_TAU={smc_expansion_tau}
      - export SMC_EXPANSION_LOOKAHEAD={smc_expansion_lookahead}
      - export CORRECTION_STRENGTHS='{correction_strengths}'
      - export SEED={seed}
      - export RUN_SANA=0
      - export RUN_SD35=1
      - export RUN_FLUX=0
      - export SD35_BACKEND={sd35_backend}
      - if [ "$$AUTO_BACKEND_STEPS" != "0" ]; then if [ "$$SD35_BACKEND" = "sid" ]; then export STEPS=4; elif [ "$$SD35_BACKEND" = "sd35_base" ]; then export STEPS=28; fi; fi
      - echo "Resolved STEPS=$$STEPS (backend=$$SD35_BACKEND auto_backend_steps=$$AUTO_BACKEND_STEPS)"
      - export USE_QWEN={use_qwen}
      - export PRECOMPUTE_REWRITES={precompute_rewrites}
      - export REWRITES_OVERWRITE={rewrites_overwrite}
      - export QWEN_PRECOMPUTE_DEVICE={qwen_precompute_device}
      - export QWEN_PRECOMPUTE_BATCH_SIZE={qwen_precompute_batch_size}
      - export QWEN_PRECOMPUTE_SAVE_EVERY={qwen_precompute_save_every}
      - export QWEN_PRECOMPUTE_CLEAR_CACHE={qwen_precompute_clear_cache}
      - mkdir -p /mnt/data/v-yigu/hpsv2_rewrite_cache
      - export REWRITES_FILE=/mnt/data/v-yigu/hpsv2_rewrite_cache/{run_tag}_$$PROMPT_STYLE_{start_index}_{end_index}.json
      - export SAVE_IMAGES={save_images}
      - export SAVE_BEST_IMAGES={save_best_images}
      - export SAVE_VARIANTS=0
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "transformers==4.52.4" "tokenizers==0.21.1" "qwen-vl-utils==0.0.14"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "ftfy>=6.2.3" "regex>=2024.11.6" "xxhash>=3.4.1"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "pandas>=2.1.4" "pyarrow>=14.0.2" "datasets>=2.19.0"
      - /opt/conda/envs/ptca/bin/python -c "import importlib.metadata as md, ftfy, regex, xxhash, pandas, pyarrow, datasets, transformers; print('final pin ok', 'transformers='+md.version('transformers'), md.version('ftfy'), md.version('regex'), md.version('xxhash'), md.version('pandas'), md.version('pyarrow'), md.version('datasets')); assert hasattr(transformers, 'Qwen2_5_VLForConditionalGeneration'), 'Qwen2_5_VL missing from transformers ' + md.version('transformers')"
      - bash hpsv2_sd35_flux_allalgos.sh

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: True
        SHARED_MEMORY_PERCENT: 0.5

  max_trials: 1
  type: grid
  params:
    - name: run_tag
      values: [ "senseflow_smc_expansion_imagereward" ]
    - name: hf_token
      values: [ "YOUR_HF_TOKEN_HERE" ]
    - name: sd35_backend
      values: [ "senseflow_large" ]
    - name: prompt_style
      values: [ "all" ]
    - name: start_index
      values: [ 0 ]
    - name: end_index
      values: [ -1 ]
    - name: use_subset
      values: [ 1 ]
    - name: methods
      values: [ "baseline smc" ]
    - name: reward_backends
      values: [ "imagereward hpsv2 pickscore" ]
    - name: eval_backends
      values: [ "imagereward hpsv2 pickscore" ]
    - name: cfg_scales
      values: [ "0.0" ]
    - name: baseline_cfg
      values: [ 0.0 ]
    - name: steps
      values: [ 4 ]
    - name: n_variants
      values: [ 3 ]
    - name: smc_k
      values: [ 8 ]
    - name: smc_gamma
      values: [ 0.10 ]
    - name: ess_threshold
      values: [ 0.5 ]
    - name: resample_start_frac
      values: [ 0.3 ]
    - name: smc_cfg_scale
      values: [ 0.0 ]
    - name: smc_variant_idx
      values: [ 0 ]
    # ── Variant-expansion SMC knobs ──
    # SenseFlow does not use CFG — the expansion bank only varies variant index
    # (cfgs/cs columns are effectively unused, but we still pass a single value).
    - name: smc_variant_expansion
      values: [ 1 ]
    - name: smc_expansion_variants
      values: [ "0 1 2" ]
    - name: smc_expansion_cfgs
      values: [ "0.0" ]
    - name: smc_expansion_cs
      values: [ "0.0" ]
    - name: smc_expansion_factor
      values: [ -1 ]
    - name: smc_expansion_proposal
      values: [ "uniform" ]
    - name: smc_expansion_tau
      values: [ 1.0 ]
    - name: smc_expansion_lookahead
      values: [ 0 ]
    - name: correction_strengths
      values: [ "0.0" ]
    - name: seed
      values: [ 42 ]
    - name: save_images
      values: [ 0 ]
    - name: save_best_images
      values: [ 1 ]
    - name: use_qwen
      values: [ 1 ]
    - name: precompute_rewrites
      values: [ 1 ]
    - name: rewrites_overwrite
      values: [ 0 ]
    - name: qwen_precompute_device
      values: [ "auto" ]
    - name: qwen_precompute_batch_size
      values: [ 16 ]
    - name: qwen_precompute_save_every
      values: [ 1 ]
    - name: qwen_precompute_clear_cache
      values: [ 1 ]
