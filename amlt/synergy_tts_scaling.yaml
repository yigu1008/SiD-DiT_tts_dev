description: synergy-tts-scaling-sid

# FLUX ActDiff augmentation grid (drop-in for grid yaml on FLUX backend).
# Methods: baseline, bon, bon_actdiff_{cfg,full}, sop, sop_actdiff_{cfg,full}, bon_mcts.
# Reuses all_in_one.yaml plumbing; flips composite_backends to flux_schnell.

# Original template description:
# Single AMLT job that runs BOTH:
#
# 1. hpsv2_composite_all_backends.sh -- full search-method kit
#    (baseline, bon, beam, smc, fksteering, dts, dts_star, sop, bon_mcts)
#    at composite_hpsv3_ir reward, across all 4 backends.
#    Output: /mnt/data/v-yigu/all_in_one/{run_tag}/composite/<backend>/seed*/
#
# 2. run_mcts_smartprompt_ablation.sh -- 12-cell smart-prompt / adaptive-CFG
#    ablation on the chosen smartprompt backend.
#    Output: /mnt/data/v-yigu/all_in_one/{run_tag}/smartprompt/<cell>/
#
# Shares one env build, one reward server boot, one weight prefetch -- saves
# ~30 min of redundant setup vs running the two yamls separately.
#
# Reward server: hpsv3 + imagereward (composite needs both; smartprompt only
# uses imagereward -- same server serves both fine).
#
# Toggle each stage with -p run_composite=1/0 and -p run_smartprompt=1/0.
# Default: composite only (smartprompt off). Flip -p run_smartprompt=1 to add it.

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub hpsv2

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: aio-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: false
    command:
      - set -x
      - export PYTHONNOUSERSITE=1
      - unset PYTHONPATH || true
      - export SID_FORCE_WANDB_STUB=1
      - export WANDB_DISABLED=true
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export PYTHON_BIN=/opt/conda/envs/ptca/bin/python
      - export HF_HOME=/mnt/data/v-yigu/model_cache/hf_cache
      - export HF_TOKEN={hf_token}
      - export HUGGING_FACE_HUB_TOKEN={hf_token}
      - export NCCL_ASYNC_ERROR_HANDLING=0
      - export NCCL_P2P_LEVEL=NVL
      # ?? Sampling env ----
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install --upgrade "setuptools>=70,<76" wheel
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --force-reinstall --no-deps "xformers==0.0.31.post1" || true
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir --no-deps "xxhash>=3.4.1" "ftfy>=6.2.3" "regex>=2024.11.6" "tqdm>=4.66.4"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "datasets>=2.19.0"
      # ?? Cache + preload all weights (4 backends + Qwen3-4B/8B) ----
      - export NUM_GPUS=${GPUS}
      - export IMAGEREWARD_CACHE=/mnt/data/v-yigu/model_cache/ImageReward
      - export HPS_ROOT=/mnt/data/v-yigu/model_cache/hpsv2
      - mkdir -p /mnt/data/v-yigu/model_cache/hf_cache /mnt/data/v-yigu/model_cache/ImageReward /mnt/data/v-yigu/model_cache/hpsv2
      - mkdir -p /home/aiscuser/.cache
      - ln -sfn /mnt/data/v-yigu/model_cache/ImageReward /home/aiscuser/.cache/ImageReward || true
      - export ALL_REPOS='YGu1998/SiD-DiT-SD3.5-large stabilityai/stable-diffusion-3.5-large domiso/SenseFlow black-forest-labs/FLUX.1-schnell Qwen/Qwen3-4B Qwen/Qwen3-8B'
      - for repo in $$ALL_REPOS; do /opt/conda/envs/ptca/bin/python -c "from huggingface_hub import snapshot_download; import os, sys; snapshot_download(sys.argv[1], token=os.environ.get('HF_TOKEN'), resume_download=True, max_workers=1); print('cache OK:', sys.argv[1])" "$$repo" || ( echo "FATAL prefetch failed for $$repo"; exit 1 ); done
      - for repo in $$ALL_REPOS; do dir="$$HF_HOME/hub/models--$$(echo $$repo | sed 's|/|--|g')"; if ! ls $$dir/snapshots/*/* >/dev/null 2>&1; then echo "FATAL cache verify failed for $$repo (looked in $$dir)"; exit 1; fi; echo "verify_OK $$repo"; done
      # ?? Reward env + ImageReward fix-up cascade ----
      - export REWARD_ENV_NAME=reward
      - export REWARD_ENV_SENTINEL_DIR=/tmp
      - CONDA_BASE=/opt/conda REWARD_ENV_NAME="$$REWARD_ENV_NAME" REWARD_ENV_SENTINEL_DIR="$$REWARD_ENV_SENTINEL_DIR" bash setup_reward_env.sh
      - export REWARD_ENV_PREFIX=$$(cat "$$REWARD_ENV_SENTINEL_DIR/reward_env_prefix_$$REWARD_ENV_NAME")
      - export REWARD_PY=$$REWARD_ENV_PREFIX/bin/python
      - $$REWARD_PY -m pip install --no-cache-dir --upgrade "setuptools<80" "wheel" || true
      - $$REWARD_PY -m pip install --no-cache-dir "fairscale==0.4.4" || true
      - $$REWARD_PY -m pip install --no-cache-dir --no-deps "diffusers>=0.27,<0.31" || true
      - $$REWARD_PY -m pip install --no-cache-dir --no-deps "datasets" "wandb" || true
      - 'IR_INIT=$$($$REWARD_PY -c "import importlib.util; s=importlib.util.find_spec(\"ImageReward\"); print(s.origin if s else \"\")" 2>/dev/null || echo ""); if [ -n "$$IR_INIT" ] && [ -f "$$IR_INIT" ]; then grep -q "^# (patched-no-ReFL)" "$$IR_INIT" || sed -i "s|^from \\.ReFL import|# (patched-no-ReFL) from .ReFL import|" "$$IR_INIT"; fi'
      - $$REWARD_PY -c "import ImageReward; print('[verify] ImageReward', ImageReward.__file__)"
      # ?? Reward server (hpsv3 + imagereward + pickscore -- composite_3 search) ----
      - export REWARD_BACKENDS_SERVER='hpsv3 imagereward pickscore'
      - export STAGE_REWARD_WEIGHTS_LOCAL=1
      - export REWARD_LOCAL_HF_CACHE=/tmp/hf_cache_local
      - REWARD_BACKENDS="$$REWARD_BACKENDS_SERVER" $$REWARD_PY preload_reward_models.py
      - 'if [ -f "$$REWARD_LOCAL_HF_CACHE/.stage_done" ]; then export REWARD_HF_HOME="$$REWARD_LOCAL_HF_CACHE"; else export REWARD_HF_HOME="$$HF_HOME"; fi'
      - export RUN_ROOT_BASE=/mnt/data/v-yigu/all_in_one/{run_tag}
      - mkdir -p "$$RUN_ROOT_BASE"
      - export REWARD_SERVER_PORT={reward_server_port}
      - export REWARD_SERVER_URL=http://localhost:$$REWARD_SERVER_PORT
      - export REWARD_SERVER_LOG=$$RUN_ROOT_BASE/reward_server.log
      - env -u NCCL_P2P_LEVEL -u NCCL_ASYNC_ERROR_HANDLING -u TORCH_NCCL_ASYNC_ERROR_HANDLING CUDA_VISIBLE_DEVICES=0 TOKENIZERS_PARALLELISM=false HF_HOME="$$REWARD_HF_HOME" "$$REWARD_PY" -u reward_server.py --port "$$REWARD_SERVER_PORT" --device cuda:0 --backends $$REWARD_BACKENDS_SERVER --image_reward_model ImageReward-v1.0 --pickscore_model yuvalkirstain/PickScore_v1 > "$$REWARD_SERVER_LOG" 2>&1 &
      - export REWARD_SERVER_PID=$$!
      - trap 'kill $$REWARD_SERVER_PID >/dev/null 2>&1 || true' EXIT
      - export HEALTH_OK=0
      - for i in $$(seq 1 1200); do if curl -s "$$REWARD_SERVER_URL/health" >/dev/null 2>&1; then export HEALTH_OK=1; break; fi; if ! kill -0 "$$REWARD_SERVER_PID" >/dev/null 2>&1; then echo "Reward server died"; tail -n 200 "$$REWARD_SERVER_LOG"; exit 1; fi; sleep 3; done
      - if [ "$$HEALTH_OK" != "1" ]; then echo "Reward server failed to become healthy"; tail -n 400 "$$REWARD_SERVER_LOG"; exit 1; fi
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "transformers==4.52.4" "tokenizers==0.21.1" "qwen-vl-utils==0.0.14"
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir "pandas>=2.1.4" "pyarrow>=14.0.2" "datasets>=2.19.0"
      # Install the eval-only reward backends (pickscore is already covered by
      # transformers; hpsv2 + open_clip are not) into the ptca env -- the env the
      # offline multi-reward eval runs in. Without this, eval hits "No module
      # named hpsv2" after full generation. Verify the import loudly here while
      # the network is still up; warm the backbone/vocab into the cache. Non-fatal.
      - '/opt/conda/envs/ptca/bin/pip install --no-cache-dir "open_clip_torch" "hpsv2x" || /opt/conda/envs/ptca/bin/pip install --no-cache-dir "open_clip_torch" "hpsv2" || echo "[aio] ERROR: hpsv2x/hpsv2 install failed (see pip output above); eval will degrade to 3-way"'
      - '/opt/conda/envs/ptca/bin/python -c "import hpsv2" && echo "[aio] hpsv2 import OK (4-way eval enabled)" || echo "[aio] ERROR hpsv2 import FAILED in ptca env; eval will degrade to 3-way (IR/hpsv3/pickscore)"'
      - 'CUDA_VISIBLE_DEVICES="" REWARD_BACKENDS="pickscore hpsv2" PRELOAD_WARM=1 HPS_ROOT="$$HPS_ROOT" HF_HOME="$$HF_HOME" /opt/conda/envs/ptca/bin/python preload_reward_models.py || echo "[aio] WARN eval reward warm-up failed; pickscore/hpsv2 may be skipped in eval"'
      - export SAMPLING_GPUS=$$((${GPUS} - 1))
      - export CUDA_VISIBLE_DEVICES_SAMPLE=$$(seq -s, 1 $$SAMPLING_GPUS)
      - export CUDA_VISIBLE_DEVICES=$$CUDA_VISIBLE_DEVICES_SAMPLE
      - export NUM_GPUS=$$SAMPLING_GPUS
      - export HF_HUB_OFFLINE=1
      - export TRANSFORMERS_OFFLINE=1
      # ?? Synergy TTS-scaling: bon_mcts CFG x prompt 2x2, per-cell sim budget ----
      # Compute-matched 1+1>2: full(60 sims) vs cfg(30)+prompt(30) over base(30),
      # on sid + flux_schnell, composite_3 reward, both qualitative prompt sets, 5 seeds.
      # bon_mcts cells: static_cfg=base(0,0) adaptive_cfg=+cfg(1,0)
      #                 rewrite_only=+prompt(0,1) full=both(1,1).
      - export RUN_ROOT=$$RUN_ROOT_BASE/synergy
      - mkdir -p "$$RUN_ROOT/_prompts"
      # Pre-place BOTH qualitative prompt sets so the orchestrator uses them (not its sampler).
      - cat prompts_qual_exp1.txt prompts_qual_exp2.txt > "$$RUN_ROOT/_prompts/backend_sid.txt"
      - export N_PROMPTS=$$(grep -c . "$$RUN_ROOT/_prompts/backend_sid.txt")
      - echo "[synergy] prompts=$$N_PROMPTS backends='{backends}' reward={search_reward} seeds='{seeds}' sims_full={n_sims_full} sims_single={n_sims_single}"
      # USE_QWEN=1 is REQUIRED: the +prompt cells (rewrite_only/full) need Qwen
      # prompt rewrites; without it the prompt axis is inert and there is no synergy.
      # Pass A: both axes (full) at the full sim budget.
      - 'BACKENDS="{backends}" METHODS="bon_mcts_full" N_PROMPTS=$$N_PROMPTS SEEDS="{seeds}" N_SIMS={n_sims_full} USE_QWEN=1 PRECOMPUTE_REWRITES=1 SYNERGY_N_VARIANTS=3 SEARCH_REWARD={search_reward} REWARD_BACKEND={search_reward} REWARD_TYPE={search_reward} REWARD_BACKENDS={search_reward} EVAL_BACKENDS="imagereward hpsv3 pickscore hpsv2" EVAL_ALLOW_MISSING_BACKENDS=1 RUN_ROOT="$$RUN_ROOT" PYTHON_BIN=/opt/conda/envs/ptca/bin/python bash hpsv2_composite_all_backends.sh || ( echo "[synergy] pass A (full) FAILED"; if [ "{fail_fast}" = "1" ]; then exit 1; fi )'
      # Pass B: base + single-axis cells at half the sim budget, SAME RUN_ROOT.
      - 'BACKENDS="{backends}" METHODS="bon_mcts_static_cfg bon_mcts_adaptive_cfg bon_mcts_rewrite_only" N_PROMPTS=$$N_PROMPTS SEEDS="{seeds}" N_SIMS={n_sims_single} USE_QWEN=1 PRECOMPUTE_REWRITES=1 SYNERGY_N_VARIANTS=3 SEARCH_REWARD={search_reward} REWARD_BACKEND={search_reward} REWARD_TYPE={search_reward} REWARD_BACKENDS={search_reward} EVAL_BACKENDS="imagereward hpsv3 pickscore hpsv2" EVAL_ALLOW_MISSING_BACKENDS=1 RUN_ROOT="$$RUN_ROOT" PYTHON_BIN=/opt/conda/envs/ptca/bin/python bash hpsv2_composite_all_backends.sh || ( echo "[synergy] pass B (single) FAILED"; if [ "{fail_fast}" = "1" ]; then exit 1; fi )'
      # ?? Synergy summary + plots (bars + qualitative image strip), best-effort ----
      - /opt/conda/envs/ptca/bin/pip install --no-cache-dir matplotlib pillow || true
      - 'for bk in {backends}; do bkroot="$$RUN_ROOT/$$bk"; [ -d "$$bkroot" ] || bkroot="$$RUN_ROOT"; sumtsv="$$RUN_ROOT/synergy-$$bk-summary.tsv"; /opt/conda/envs/ptca/bin/python rebuild_summary.py --run_root "$$bkroot" --layout all_method --out "$$sumtsv" || { echo "[synergy] rebuild_summary $$bk skipped"; continue; }; for ex in 0 1 2 3 4; do /opt/conda/envs/ptca/bin/python plot_synergy_2x2.py --summary "$$sumtsv" --metric eval_hpsv3 --cell_base bon_mcts_static_cfg --cell_cfg bon_mcts_adaptive_cfg --cell_prompt bon_mcts_rewrite_only --cell_both bon_mcts_full --example_strip $$ex --run_root "$$bkroot" --out_png "$$RUN_ROOT/synergy-$$bk-ex-$$ex.png" --title "synergy $$bk (composite_3)" || echo "[synergy] plot $$bk ex$$ex skipped"; done; done'

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: "true"
        SHARED_MEMORY_PERCENT: "0.5"

  max_trials: 1
  type: grid
  params:
    - name: run_tag
      values: [ "synergy-tts-scaling-sid" ]
    - name: hf_token
      values: [ "YOUR_HF_TOKEN_HERE" ]
    - name: reward_server_port
      values: [ 5113 ]
    - name: fail_fast
      values: [ "0" ]   # 1 = abort whole job if a pass fails
    - name: backends
      # sid only: the bon_mcts cfg x prompt 2x2 cells live in the sd35/sid suite;
      # the flux suite supports only plain bon_mcts (no factorial), so flux can't
      # form the synergy decomposition. Run a separate plain-bon_mcts flux job if
      # you want flux reference images.
      values: [ "sid" ]
    - name: search_reward
      # composite_3 = 1/3 ImageReward + 1/3 HPSv3 + 1/3 PickScore (server serves all three).
      values: [ "composite_3" ]
    - name: seeds
      values: [ "42 43 44 45 46" ]   # 5 seeds per prompt
    - name: n_sims_full
      values: [ 60 ]   # both-axes cell (bon_mcts_full)
    - name: n_sims_single
      values: [ 30 ]   # base + single-axis cells (compute-matched: 30+30 == 60)
