description: sid-sd35-parti-ddp

target:
  service: sing
  name: GenAI-Shared-UKSouth2
  workspace_name: Singularity-GenAI-WS-UKSouth2
  resource_group: singularity-genai-gpu-uksouth2

env_defaults:
  service: sing
  PRIORITY: high
  NODES: 1
  GPUS: 8
  MEM: 80

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - export PATH=/home/aiscuser/.local/bin:$$PATH
    - pip install --user datasets huggingface_hub
    - pip list

code:
  local_dir: ./

storage:
  output:
    storage_account_name: vigstandard
    container_name: data
    mount_dir: /mnt/data

search:
  job_template:
    name: sd35-parti-{run_tag}
    sku: ${NODES}x${MEM}G${GPUS}-IB
    sla_tier: Standard
    process_count_per_node: 1
    priority: high
    mpi: False
    command:
      - set -x
      - export PATH=/home/aiscuser/.local/bin:$$PATH
      - export PATH="$$PATH:/home/aiscuser/.local/bin:/root/.local/bin:/opt/conda/envs/ptca/bin"
      - export AZFUSE_USE_FUSE=0
      - export NCCL_ASYNC_ERROR_HANDLING=0
      - export NCCL_P2P_LEVEL=NVL
      - source /opt/conda/etc/profile.d/conda.sh
      - /opt/conda/envs/ptca/bin/pip install -r requirements.txt
      - /opt/conda/envs/ptca/bin/pip install ImageReward huggingface_hub
      - export NUM_GPUS=${GPUS}
      - export PROMPT_FILE={prompt_file}
      - export START_INDEX={start_index}
      - export END_INDEX={end_index}
      - export MODES="{modes}"
      - export CFG_SCALES="{cfg_scales}"
      - export BASELINE_CFG={baseline_cfg}
      - export STEPS={steps}
      - export N_VARIANTS={n_variants}
      - export N_SIMS={n_sims}
      - export UCB_C={ucb_c}
      - export SEED={seed}
      - export OUT_DIR=/mnt/data/v-yigu/sd35_parti_runs/{run_tag}
      # Optional toggles:
      #   add --seed_per_prompt, --save_images, --save_variants as needed
      - bash run_sd35_ddp.sh --seed_per_prompt --save_images

    submit_args:
      env:
        DATASET_MOUNT_BLOCK_BASED_CACHE_ENABLED: True
        SHARED_MEMORY_PERCENT: 0.5

  max_trials: 100
  type: grid
  params:
    # Example Parti shards/ranges. Replace with your real prompt file/ranges.
    - name: run_tag
      values: [ "parti_00000_00100" ]
    - name: prompt_file
      values: [ "/mnt/data/v-yigu/parti_prompts/parti_prompts.txt" ]
    - name: start_index
      values: [ 0 ]
    - name: end_index
      values: [ 100 ]
    - name: modes
      values: [ "base greedy mcts" ]
    - name: cfg_scales
      values: [ "0.0 0.25 0.5 0.75 1.0 1.25 1.5 1.75 2.0" ]
    - name: baseline_cfg
      values: [ 1.0 ]
    - name: steps
      values: [ 4 ]
    - name: n_variants
      values: [ 3 ]
    - name: n_sims
      values: [ 50 ]
    - name: ucb_c
      values: [ 1.41 ]
    - name: seed
      values: [ 42 ]
